document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"77304fbb-eb96-43c8-9803-5747373db049\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   The Availability Dashboard — Deck styles\n   Warm collegiate aesthetic. Burnt orange + cream + charcoal.\n   ============================================================ */\n\n:root {\n  --orange: #BF5700;\n  --orange-deep: #8E3F00;\n  --gold: #D6A461;\n  --charcoal: #333F48;\n  --ink: #1B2229;\n  --cream: #F8F3E6;\n  --cream-2: #EFE7D2;\n  --paper: #FBF8EE;\n  --rule: rgba(51,63,72,0.18);\n  --rule-strong: rgba(51,63,72,0.45);\n\n  --serif: \"Crimson Pro\", \"Crimson Text\", Georgia, serif;\n  --sans: \"Inter\", -apple-system, BlinkMacSystemFont, \"Helvetica Neue\", sans-serif;\n  --mono: \"JetBrains Mono\", ui-monospace, monospace;\n}\n\n/* deck-stage component fills the viewport, slides are 1920×1080 */\ndeck-stage section {\n  background: var(--cream);\n  color: var(--charcoal);\n  font-family: var(--sans);\n  overflow: hidden;\n  /* deck-stage component handles position/size; we add layout */\n  display: block;\n}\n\n/* ===== Common slide chrome ===== */\n.slide-pad {\n  position: absolute;\n  inset: 100px 100px 80px 100px;\n  display: flex;\n  flex-direction: column;\n}\n\n/* Top bar: chapter mark + title of deck */\n.chrome-top {\n  position: absolute;\n  top: 56px;\n  left: 100px;\n  right: 100px;\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  font-family: var(--sans);\n  font-size: 24px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--charcoal);\n  opacity: 0.7;\n  font-weight: 500;\n  white-space: nowrap;\n  gap: 32px;\n}\n.chrome-top > div { white-space: nowrap; }\n\n.chrome-top .chapter-num {\n  color: var(--orange);\n  font-weight: 600;\n}\n\n/* Bottom bar: page label */\n.chrome-bottom {\n  position: absolute;\n  bottom: 48px;\n  left: 100px;\n  right: 100px;\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  font-family: var(--sans);\n  font-size: 24px;\n  letter-spacing: 0.16em;\n  text-transform: uppercase;\n  color: var(--charcoal);\n  opacity: 0.55;\n  font-weight: 500;\n}\n\n.chrome-bottom .rule {\n  flex: 1;\n  height: 1px;\n  background: var(--rule);\n  margin: 0 32px;\n}\n\n/* ===== Title typography ===== */\n.eyebrow {\n  font-family: var(--sans);\n  font-size: 22px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--orange);\n  font-weight: 600;\n  margin-bottom: 28px;\n}\n\n.title-serif {\n  font-family: var(--serif);\n  font-size: 96px;\n  line-height: 1.02;\n  font-weight: 500;\n  letter-spacing: -0.015em;\n  color: var(--ink);\n  text-wrap: balance;\n}\n\n.title-md {\n  font-family: var(--serif);\n  font-size: 72px;\n  line-height: 1.05;\n  font-weight: 500;\n  letter-spacing: -0.01em;\n  color: var(--ink);\n  text-wrap: balance;\n}\n\n.subtitle {\n  font-family: var(--serif);\n  font-style: italic;\n  font-size: 38px;\n  line-height: 1.3;\n  color: var(--charcoal);\n  font-weight: 400;\n  text-wrap: pretty;\n  max-width: 1300px;\n}\n\n.body-text {\n  font-family: var(--sans);\n  font-size: 32px;\n  line-height: 1.45;\n  color: var(--charcoal);\n  font-weight: 400;\n  text-wrap: pretty;\n  max-width: 1100px;\n}\n\n.body-sm {\n  font-family: var(--sans);\n  font-size: 26px;\n  line-height: 1.5;\n  color: var(--charcoal);\n  font-weight: 400;\n}\n\n.kicker-num {\n  font-family: var(--serif);\n  font-size: 28px;\n  font-weight: 500;\n  color: var(--orange);\n  letter-spacing: 0.04em;\n}\n\n.lead {\n  font-family: var(--sans);\n  font-size: 30px;\n  line-height: 1.45;\n  color: var(--charcoal);\n  text-wrap: pretty;\n  max-width: 1300px;\n}\n\n/* ===== Decorative ornaments ===== */\n.ornament {\n  display: flex;\n  align-items: center;\n  gap: 14px;\n  margin: 32px 0;\n}\n.ornament .dot {\n  width: 8px; height: 8px;\n  border-radius: 50%;\n  background: var(--orange);\n}\n.ornament .line {\n  width: 80px; height: 1px;\n  background: var(--rule-strong);\n}\n\n.thin-rule {\n  height: 1px;\n  background: var(--rule);\n  width: 100%;\n}\n.thick-rule {\n  height: 4px;\n  width: 80px;\n  background: var(--orange);\n}\n\n/* ===== Animation primitives ===== */\n@keyframes fade-up {\n  from { opacity: 0; transform: translateY(24px); }\n  to { opacity: 1; transform: translateY(0); }\n}\n@keyframes fade-in {\n  from { opacity: 0; }\n  to { opacity: 1; }\n}\n@keyframes draw-line {\n  from { transform: scaleX(0); }\n  to { transform: scaleX(1); }\n}\n@keyframes count-pulse {\n  0%, 100% { opacity: 1; }\n  50% { opacity: 0.6; }\n}\n@keyframes dial-sweep {\n  from { transform: rotate(-120deg); }\n  to { transform: rotate(60deg); }\n}\n@keyframes pulse-line {\n  0% { stroke-dashoffset: 2000; }\n  100% { stroke-dashoffset: 0; }\n}\n@keyframes orbit {\n  from { transform: rotate(0); }\n  to { transform: rotate(360deg); }\n}\n@keyframes float-up {\n  0%, 100% { transform: translateY(0); }\n  50% { transform: translateY(-8px); }\n}\n\n/* Apply animations only when slide is active */\ndeck-stage section[data-deck-active] .anim-fade-up {\n  animation: fade-up 0.9s cubic-bezier(0.2, 0.7, 0.2, 1) both;\n}\ndeck-stage section[data-deck-active] .anim-fade-in {\n  animation: fade-in 0.9s ease-out both;\n}\ndeck-stage section[data-deck-active] .anim-draw {\n  transform-origin: left center;\n  animation: draw-line 1.2s cubic-bezier(0.2, 0.7, 0.2, 1) both;\n}\n\n/* Stagger via inline style --d */\n.anim-fade-up, .anim-fade-in, .anim-draw {\n  animation-delay: var(--d, 0s);\n}\n\n/* When not active, keep state hidden so re-entry replays */\ndeck-stage section:not([data-deck-active]) .anim-fade-up,\ndeck-stage section:not([data-deck-active]) .anim-fade-in {\n  opacity: 0;\n}\ndeck-stage section:not([data-deck-active]) .anim-draw {\n  transform: scaleX(0);\n}\n\n/* ===== Slide 1: Cover ===== */\n.cover {\n  position: absolute;\n  inset: 0;\n  background:\n    radial-gradient(ellipse at 80% 20%, rgba(214,164,97,0.18), transparent 55%),\n    radial-gradient(ellipse at 20% 90%, rgba(191,87,0,0.10), transparent 50%),\n    var(--cream);\n  display: flex;\n  flex-direction: column;\n  justify-content: space-between;\n  padding: 100px;\n}\n\n.cover-top {\n  display: flex;\n  justify-content: space-between;\n  align-items: flex-start;\n  font-family: var(--sans);\n  font-size: 24px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--charcoal);\n  font-weight: 500;\n}\n\n.cover-mark {\n  display: flex;\n  align-items: center;\n  gap: 14px;\n}\n.cover-mark .mark-letter {\n  font-family: var(--serif);\n  font-size: 32px;\n  font-weight: 600;\n  color: var(--orange);\n  font-style: italic;\n}\n\n.cover-title {\n  font-family: var(--serif);\n  font-size: 168px;\n  line-height: 0.95;\n  font-weight: 500;\n  letter-spacing: -0.025em;\n  color: var(--ink);\n  text-wrap: balance;\n  max-width: 1500px;\n}\n.cover-title em {\n  font-style: italic;\n  color: var(--orange);\n  font-weight: 500;\n}\n\n.cover-sub {\n  font-family: var(--serif);\n  font-style: italic;\n  font-size: 44px;\n  line-height: 1.25;\n  color: var(--charcoal);\n  font-weight: 400;\n  margin-top: 36px;\n  max-width: 1300px;\n}\n\n.cover-bottom {\n  display: flex;\n  justify-content: space-between;\n  align-items: flex-end;\n  font-family: var(--sans);\n  font-size: 24px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--charcoal);\n  font-weight: 500;\n}\n\n/* Animated dial on cover */\n.dial-wrap {\n  position: absolute;\n  right: 100px;\n  top: 50%;\n  transform: translateY(-50%);\n  width: 540px;\n  height: 540px;\n  pointer-events: none;\n}\n\n.dial {\n  width: 100%;\n  height: 100%;\n  position: relative;\n}\n\n.dial svg { width: 100%; height: 100%; display: block; }\n\ndeck-stage section[data-deck-active] .dial-arc {\n  stroke-dasharray: 800;\n  stroke-dashoffset: 800;\n  animation: dial-fill 2.4s cubic-bezier(0.4, 0.05, 0.2, 1) 0.6s both;\n}\n@keyframes dial-fill {\n  to { stroke-dashoffset: 240; }\n}\n\ndeck-stage section[data-deck-active] .dial-needle {\n  transform-origin: 270px 270px;\n  transform: rotate(-110deg);\n  animation: needle-sweep 2.8s cubic-bezier(0.4, 0.05, 0.2, 1) 0.5s both;\n}\n@keyframes needle-sweep {\n  0% { transform: rotate(-110deg); }\n  60% { transform: rotate(70deg); }\n  72% { transform: rotate(54deg); }\n  100% { transform: rotate(58deg); }\n}\n\ndeck-stage section[data-deck-active] .dial-pulse {\n  animation: dial-pulse 2s ease-in-out 3s infinite;\n}\n@keyframes dial-pulse {\n  0%, 100% { opacity: 0.3; transform: scale(1); }\n  50% { opacity: 0.55; transform: scale(1.04); }\n}\n\ndeck-stage section[data-deck-active] .counter {\n  animation: counter-up 2.2s steps(60) 0.8s both;\n}\n@keyframes counter-up {\n  from { opacity: 0; }\n  to { opacity: 1; }\n}\n\n/* ===== Slide layouts ===== */\n.two-col {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 80px;\n  align-items: start;\n}\n\n.three-col {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 56px;\n  align-items: start;\n}\n\n.audience-card {\n  border-top: 3px solid var(--orange);\n  padding-top: 28px;\n}\n.audience-card .role {\n  font-family: var(--serif);\n  font-size: 44px;\n  font-weight: 500;\n  color: var(--ink);\n  margin-bottom: 14px;\n}\n.audience-card .role-num {\n  font-family: var(--serif);\n  font-size: 26px;\n  font-style: italic;\n  color: var(--orange);\n  margin-bottom: 10px;\n}\n.audience-card .desc {\n  font-family: var(--sans);\n  font-size: 26px;\n  line-height: 1.5;\n  color: var(--charcoal);\n}\n\n/* Pain points list */\n.pain-list {\n  display: flex;\n  flex-direction: column;\n  gap: 22px;\n  list-style: none;\n  padding: 0;\n  margin: 0;\n}\n.pain-list li {\n  font-family: var(--serif);\n  font-style: italic;\n  font-size: 36px;\n  line-height: 1.3;\n  color: var(--ink);\n  padding-left: 56px;\n  position: relative;\n}\n.pain-list li::before {\n  content: \"?\";\n  position: absolute;\n  left: 0;\n  top: -4px;\n  font-family: var(--serif);\n  font-size: 44px;\n  color: var(--orange);\n  font-weight: 600;\n}\n.pain-list li.statement::before { content: \"—\"; font-style: normal; }\n\n/* Big quote / pull */\n.pull {\n  font-family: var(--serif);\n  font-size: 88px;\n  line-height: 1.05;\n  font-weight: 500;\n  color: var(--ink);\n  text-wrap: balance;\n  letter-spacing: -0.015em;\n}\n.pull em {\n  color: var(--orange);\n  font-style: italic;\n  display: inline-block;\n  padding: 0 0.08em;\n}\n\n/* Phase timeline */\n.phases {\n  display: grid;\n  grid-template-columns: repeat(5, 1fr);\n  gap: 28px;\n  margin-top: 64px;\n}\n.phase {\n  border-top: 2px solid var(--rule);\n  padding-top: 24px;\n  position: relative;\n}\n.phase.active { border-top-color: var(--orange); border-top-width: 3px; }\n.phase .ph-num {\n  font-family: var(--serif);\n  font-size: 26px;\n  font-style: italic;\n  color: var(--orange);\n  margin-bottom: 10px;\n  letter-spacing: 0.02em;\n}\n.phase .ph-title {\n  font-family: var(--serif);\n  font-size: 32px;\n  font-weight: 500;\n  line-height: 1.15;\n  color: var(--ink);\n  margin-bottom: 14px;\n  text-wrap: balance;\n}\n.phase .ph-desc {\n  font-family: var(--sans);\n  font-size: 24px;\n  line-height: 1.5;\n  color: var(--charcoal);\n  text-wrap: pretty;\n}\n\n/* Metrics grid */\n.metric-grid {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 48px;\n  margin-top: 48px;\n}\n.metric-tile {\n  display: flex;\n  flex-direction: column;\n  gap: 14px;\n}\n.metric-tile .num {\n  font-family: var(--serif);\n  font-size: 120px;\n  line-height: 1;\n  font-weight: 500;\n  color: var(--orange);\n  letter-spacing: -0.02em;\n}\n.metric-tile .lab {\n  font-family: var(--sans);\n  font-size: 24px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--charcoal);\n  font-weight: 500;\n}\n.metric-tile .ds {\n  font-family: var(--sans);\n  font-size: 24px;\n  color: var(--charcoal);\n  opacity: 0.8;\n  line-height: 1.5;\n}\n\n/* Section header slide */\n.section-hero {\n  position: absolute;\n  inset: 0;\n  background: var(--charcoal);\n  color: var(--cream);\n  display: flex;\n  align-items: center;\n  justify-content: flex-start;\n  padding: 100px;\n  overflow: hidden;\n}\n.section-hero .ribbon {\n  font-family: var(--sans);\n  font-size: 26px;\n  letter-spacing: 0.3em;\n  text-transform: uppercase;\n  color: var(--gold);\n  margin-bottom: 32px;\n  font-weight: 500;\n}\n.section-hero h1 {\n  font-family: var(--serif);\n  font-size: 140px;\n  line-height: 0.98;\n  font-weight: 500;\n  color: var(--cream);\n  letter-spacing: -0.02em;\n  text-wrap: balance;\n  margin: 0;\n  max-width: 1400px;\n}\n.section-hero h1 em {\n  font-style: italic;\n  color: var(--gold);\n}\n.section-hero .num-mark {\n  position: absolute;\n  top: 100px;\n  right: 100px;\n  font-family: var(--serif);\n  font-size: 200px;\n  line-height: 1;\n  color: rgba(214, 164, 97, 0.18);\n  font-weight: 500;\n  font-style: italic;\n}\n\n/* Speakers slide */\n.speakers-row {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 64px;\n  margin-top: 80px;\n}\n.speaker {\n  border-top: 1px solid var(--rule);\n  padding-top: 32px;\n}\n.speaker .pill {\n  display: inline-block;\n  padding: 8px 18px;\n  background: var(--orange);\n  color: var(--cream);\n  font-family: var(--sans);\n  font-size: 24px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  font-weight: 600;\n  margin-bottom: 24px;\n}\n.speaker .label {\n  font-family: var(--serif);\n  font-size: 38px;\n  line-height: 1.2;\n  font-weight: 500;\n  color: var(--ink);\n  margin-bottom: 12px;\n}\n.speaker .sub {\n  font-family: var(--sans);\n  font-size: 24px;\n  color: var(--charcoal);\n  opacity: 0.8;\n  line-height: 1.5;\n}\n\n/* Framework table */\n.fw-table {\n  width: 100%;\n  border-collapse: collapse;\n  margin-top: 40px;\n}\n.fw-table th, .fw-table td {\n  text-align: left;\n  padding: 28px 24px;\n  font-family: var(--sans);\n  vertical-align: top;\n  border-bottom: 1px solid var(--rule);\n}\n.fw-table th {\n  font-size: 24px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--orange);\n  font-weight: 600;\n  border-bottom: 2px solid var(--orange);\n}\n.fw-table td {\n  font-size: 26px;\n  color: var(--charcoal);\n  line-height: 1.4;\n}\n.fw-table td:first-child {\n  font-family: var(--serif);\n  font-size: 32px;\n  font-weight: 500;\n  color: var(--ink);\n  width: 28%;\n}\n\n/* Model considerations grid */\n.model-grid {\n  display: grid;\n  grid-template-columns: repeat(2, 1fr);\n  gap: 28px;\n  margin-top: 48px;\n}\n.model-item {\n  border-left: 3px solid var(--orange);\n  padding: 12px 24px;\n  background: rgba(255,255,255,0.5);\n}\n.model-item .term {\n  font-family: var(--serif);\n  font-size: 32px;\n  font-weight: 500;\n  color: var(--ink);\n}\n.model-item .def {\n  font-family: var(--sans);\n  font-size: 24px;\n  color: var(--charcoal);\n  opacity: 0.85;\n  margin-top: 4px;\n}\n\n/* Readiness columns */\n.readiness {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 80px;\n  margin-top: 48px;\n}\n.readiness .col {\n  padding: 40px;\n  background: var(--paper);\n  border: 1px solid var(--rule);\n}\n.readiness .col-head {\n  font-family: var(--serif);\n  font-style: italic;\n  font-size: 24px;\n  color: var(--orange);\n  margin-bottom: 8px;\n}\n.readiness .col-title {\n  font-family: var(--serif);\n  font-size: 44px;\n  font-weight: 500;\n  color: var(--ink);\n  margin-bottom: 28px;\n}\n.readiness ul {\n  list-style: none;\n  padding: 0;\n  margin: 0;\n  display: flex;\n  flex-direction: column;\n  gap: 16px;\n}\n.readiness li {\n  font-family: var(--sans);\n  font-size: 26px;\n  line-height: 1.4;\n  color: var(--charcoal);\n  padding-left: 24px;\n  position: relative;\n}\n.readiness li::before {\n  content: \"\";\n  position: absolute;\n  left: 0;\n  top: 14px;\n  width: 8px; height: 8px;\n  background: var(--orange);\n  border-radius: 50%;\n}\n\n/* Mitigation rows */\n.mit-list {\n  display: flex;\n  flex-direction: column;\n  gap: 32px;\n  margin-top: 48px;\n}\n.mit-row {\n  display: grid;\n  grid-template-columns: 80px 1fr 1.5fr;\n  gap: 40px;\n  align-items: start;\n  padding-bottom: 28px;\n  border-bottom: 1px solid var(--rule);\n}\n.mit-row:last-child { border-bottom: none; }\n.mit-row .num {\n  font-family: var(--serif);\n  font-size: 56px;\n  font-style: italic;\n  color: var(--orange);\n  line-height: 1;\n}\n.mit-row .risk {\n  font-family: var(--serif);\n  font-size: 30px;\n  font-weight: 500;\n  color: var(--ink);\n  line-height: 1.3;\n}\n.mit-row .fix {\n  font-family: var(--sans);\n  font-size: 26px;\n  color: var(--charcoal);\n  line-height: 1.5;\n}\n\n/* Alerting channels */\n.channels {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 48px;\n  margin-top: 56px;\n}\n.channel-tile {\n  padding: 36px 32px;\n  background: var(--paper);\n  border-top: 3px solid var(--orange);\n}\n.channel-tile .ch {\n  font-family: var(--serif);\n  font-size: 40px;\n  font-weight: 500;\n  color: var(--ink);\n  margin-bottom: 14px;\n}\n.channel-tile .when {\n  font-family: var(--sans);\n  font-size: 26px;\n  color: var(--charcoal);\n  line-height: 1.45;\n  opacity: 0.85;\n}\n\n/* Notification before/after */\n.before-after {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 56px;\n  margin-top: 48px;\n  align-items: stretch;\n}\n.ba-card {\n  padding: 40px;\n  border: 1px solid var(--rule);\n  background: var(--paper);\n  display: flex;\n  flex-direction: column;\n}\n.ba-card.future {\n  background: var(--ink);\n  border-color: var(--ink);\n  color: var(--cream);\n}\n.ba-card .ba-label {\n  font-family: var(--sans);\n  font-size: 24px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--orange);\n  margin-bottom: 20px;\n  font-weight: 600;\n}\n.ba-card.future .ba-label { color: var(--gold); }\n.ba-card .ba-title {\n  font-family: var(--serif);\n  font-style: italic;\n  font-size: 28px;\n  margin-bottom: 24px;\n  color: var(--charcoal);\n}\n.ba-card.future .ba-title { color: var(--gold); }\n.ba-card .ba-msg {\n  font-family: var(--mono), monospace;\n  font-size: 24px;\n  line-height: 1.55;\n  color: var(--charcoal);\n  background: var(--cream);\n  padding: 28px;\n  border-left: 3px solid var(--rule-strong);\n  flex: 1;\n}\n.ba-card.future .ba-msg {\n  background: rgba(255,255,255,0.06);\n  border-left-color: var(--gold);\n  color: var(--cream);\n}\n.ba-card.future .ba-msg strong { color: var(--gold); }\n\n/* Dashboard mockup */\n.dash {\n  margin-top: 40px;\n  background: var(--ink);\n  color: var(--cream);\n  padding: 40px;\n  border-radius: 4px;\n  display: grid;\n  grid-template-columns: 1fr 1fr 1fr;\n  gap: 28px;\n  font-family: var(--sans);\n}\n.dash-tile {\n  background: rgba(255,255,255,0.04);\n  border: 1px solid rgba(214,164,97,0.2);\n  padding: 24px;\n}\n.dash-tile .h {\n  font-size: 24px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--gold);\n  margin-bottom: 12px;\n  font-weight: 600;\n}\n.dash-tile .v {\n  font-family: var(--serif);\n  font-size: 64px;\n  font-weight: 500;\n  color: var(--cream);\n  line-height: 1;\n}\n.dash-tile .d {\n  font-size: 24px;\n  color: rgba(248,243,230,0.6);\n  margin-top: 10px;\n}\n.dash-tile.full { grid-column: 1 / -1; padding: 28px 24px 16px; }\n.dash-tile.warn .v { color: #E89A3D; }\n.dash-tile.ok .v { color: #8BC0A8; }\n.dash-tile.bad .v { color: #D87065; }\n\n/* Q&A slide */\n.qa {\n  position: absolute;\n  inset: 0;\n  background: var(--cream);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  flex-direction: column;\n  text-align: center;\n}\n.qa .qmark {\n  font-family: var(--serif);\n  font-style: italic;\n  font-size: 480px;\n  line-height: 0.85;\n  color: var(--orange);\n  letter-spacing: -0.04em;\n  font-weight: 500;\n}\n.qa .qa-label {\n  font-family: var(--serif);\n  font-size: 64px;\n  font-weight: 500;\n  color: var(--ink);\n  margin-top: 32px;\n  letter-spacing: 0.04em;\n}\n.qa .qa-sub {\n  font-family: var(--sans);\n  font-size: 24px;\n  letter-spacing: 0.3em;\n  text-transform: uppercase;\n  color: var(--charcoal);\n  margin-top: 24px;\n  opacity: 0.7;\n  font-weight: 500;\n}\n\n/* Pulse line on slide 3 */\n.pulse-line {\n  position: absolute;\n  bottom: 100px;\n  left: 100px;\n  right: 100px;\n  height: 120px;\n}\n.pulse-line svg { width: 100%; height: 100%; }\n\ndeck-stage section[data-deck-active] .pulse-path {\n  stroke-dasharray: 3000;\n  stroke-dashoffset: 3000;\n  animation: pulse-trace 3s cubic-bezier(0.4, 0, 0.2, 1) 0.6s forwards;\n}\n@keyframes pulse-trace {\n  to { stroke-dashoffset: 0; }\n}\n\n/* Dial small version (used as motif) */\n.mini-dial {\n  width: 280px;\n  height: 280px;\n}\n\n/* Used to dim chrome on cover */\n.no-chrome .chrome-top, .no-chrome .chrome-bottom { display: none; }\n\n/* ============================================================\n   Infographic components\n   ============================================================ */\n\n/* --- Slide 5: Three-lens fan-out --- */\n.lens-fan {\n  display: grid;\n  grid-template-columns: 240px 1fr;\n  gap: 80px;\n  align-items: center;\n  margin: 56px auto 0;\n  min-height: 540px;\n  max-width: 1500px;\n}\n.lens-source {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 18px;\n}\n.lens-source .pipe-icon {\n  width: 200px;\n  height: 200px;\n  border-radius: 50%;\n  background: var(--ink);\n  color: var(--cream);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  font-family: var(--serif);\n  font-size: 32px;\n  font-style: italic;\n  text-align: center;\n  line-height: 1.1;\n  position: relative;\n  flex-direction: column;\n}\n.lens-source .pipe-icon::after {\n  content: \"\";\n  position: absolute;\n  inset: -10px;\n  border: 1px solid rgba(191,87,0,0.3);\n  border-radius: 50%;\n}\n.lens-source .pipe-icon .small {\n  font-size: 22px;\n  color: var(--gold);\n  font-style: normal;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  font-weight: 600;\n  font-family: var(--sans);\n  margin-bottom: 4px;\n}\n.lens-source .pipe-label {\n  font-family: var(--sans);\n  font-size: 22px;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: var(--charcoal);\n  font-weight: 600;\n}\n\n.lens-targets {\n  display: grid;\n  grid-template-rows: repeat(3, 1fr);\n  gap: 24px;\n  position: relative;\n}\n.lens-card {\n  background: var(--paper);\n  border-left: 4px solid var(--orange);\n  padding: 24px 32px;\n  display: grid;\n  grid-template-columns: 1fr 2fr;\n  gap: 28px;\n  align-items: center;\n}\n.lens-card .lens-role {\n  font-family: var(--serif);\n  font-size: 36px;\n  font-weight: 500;\n  color: var(--ink);\n}\n.lens-card .lens-num {\n  font-family: var(--serif);\n  font-size: 22px;\n  font-style: italic;\n  color: var(--orange);\n  margin-bottom: 4px;\n}\n.lens-card .lens-vis {\n  font-family: var(--mono);\n  font-size: 20px;\n  color: var(--charcoal);\n  line-height: 1.6;\n}\n.lens-card .lens-vis .ok { color: #2F7D5B; }\n.lens-card .lens-vis .warn { color: #B8761F; }\n.lens-card .lens-vis .bad { color: #A8463C; }\n.lens-card .lens-vis .big {\n  font-family: var(--serif);\n  font-size: 64px;\n  font-weight: 500;\n  color: var(--orange);\n  line-height: 1;\n  letter-spacing: -0.02em;\n}\n\n.lens-svg {\n  position: absolute;\n  left: -200px;\n  top: 0;\n  width: 200px;\n  height: 100%;\n  pointer-events: none;\n}\n\n/* --- Slide 7: Hub & spoke --- */\n.hub-spoke {\n  position: relative;\n  width: 100%;\n  height: 720px;\n  margin-top: 24px;\n}\n.hub-spoke svg.connectors {\n  position: absolute;\n  inset: 0;\n  width: 100%;\n  height: 100%;\n}\n.hub {\n  position: absolute;\n  left: 50%;\n  top: 50%;\n  transform: translate(-50%, -50%);\n  width: 280px;\n  height: 280px;\n  border-radius: 50%;\n  background: var(--ink);\n  color: var(--cream);\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  justify-content: center;\n  text-align: center;\n  z-index: 3;\n  box-shadow: 0 0 0 12px var(--cream), 0 0 0 14px rgba(191,87,0,0.35);\n}\n.hub .hub-eyebrow {\n  font-family: var(--sans);\n  font-size: 20px;\n  letter-spacing: 0.24em;\n  text-transform: uppercase;\n  color: var(--gold);\n  font-weight: 600;\n  margin-bottom: 12px;\n}\n.hub .hub-title {\n  font-family: var(--serif);\n  font-size: 40px;\n  line-height: 1.05;\n  font-weight: 500;\n  font-style: italic;\n}\n.hub .hub-sub {\n  font-family: var(--sans);\n  font-size: 22px;\n  margin-top: 12px;\n  color: rgba(248,243,230,0.7);\n  letter-spacing: 0.05em;\n}\n\n.spoke {\n  position: absolute;\n  width: 220px;\n  background: var(--paper);\n  border: 1px solid var(--rule);\n  border-top: 3px solid var(--orange);\n  padding: 20px 22px;\n  z-index: 2;\n}\n.spoke .sp-name {\n  font-family: var(--serif);\n  font-size: 26px;\n  font-weight: 500;\n  color: var(--ink);\n  line-height: 1.1;\n  margin-bottom: 6px;\n}\n.spoke .sp-meta {\n  font-family: var(--mono);\n  font-size: 18px;\n  color: var(--charcoal);\n  opacity: 0.75;\n}\n\n@keyframes flow-dot {\n  0% { offset-distance: 0%; opacity: 0; }\n  10% { opacity: 1; }\n  90% { opacity: 1; }\n  100% { offset-distance: 100%; opacity: 0; }\n}\n\n.connector-line {\n  stroke: var(--rule-strong);\n  stroke-width: 1.5;\n  stroke-dasharray: 4 4;\n  fill: none;\n}\n\ndeck-stage section[data-deck-active] .flow-dot {\n  animation: dash-flow 3s linear infinite;\n}\n@keyframes dash-flow {\n  to { stroke-dashoffset: -200; }\n}\n\n/* --- Slide 9: Timeline with cumulative curve --- */\n.tl-wrap {\n  position: relative;\n  margin-top: 40px;\n  padding: 32px 0 0;\n}\n.tl-curve {\n  height: 200px;\n  position: relative;\n  margin-bottom: 32px;\n}\n.tl-curve svg { width: 100%; height: 100%; display: block; }\n\ndeck-stage section[data-deck-active] .curve-path {\n  stroke-dasharray: 2400;\n  stroke-dashoffset: 2400;\n  animation: curve-draw 2.4s cubic-bezier(0.4,0,0.2,1) 0.5s forwards;\n}\n@keyframes curve-draw {\n  to { stroke-dashoffset: 0; }\n}\ndeck-stage section[data-deck-active] .curve-fill {\n  opacity: 0;\n  animation: curve-fade 1.6s ease 1.6s forwards;\n}\n@keyframes curve-fade {\n  to { opacity: 0.18; }\n}\n\n.tl-axis {\n  display: grid;\n  grid-template-columns: repeat(5, 1fr);\n  position: relative;\n  border-top: 2px solid var(--orange);\n}\n.tl-tick {\n  padding: 24px 16px 0;\n  position: relative;\n}\n.tl-tick::before {\n  content: \"\";\n  position: absolute;\n  top: -8px;\n  left: 24px;\n  width: 14px; height: 14px;\n  background: var(--orange);\n  border-radius: 50%;\n}\n.tl-tick .tl-num {\n  font-family: var(--serif);\n  font-size: 24px;\n  font-style: italic;\n  color: var(--orange);\n  margin-bottom: 8px;\n}\n.tl-tick .tl-title {\n  font-family: var(--serif);\n  font-size: 24px;\n  font-weight: 500;\n  color: var(--ink);\n  line-height: 1.15;\n  margin-bottom: 16px;\n  text-wrap: balance;\n  padding-right: 16px;\n  min-height: 56px;\n}\n.tl-tick .tl-desc {\n  font-family: var(--sans);\n  font-size: 22px;\n  color: var(--charcoal);\n  line-height: 1.45;\n  padding-right: 24px;\n  text-wrap: pretty;\n}\n.tl-bullets {\n  list-style: none;\n  padding: 0;\n  margin: 0;\n  display: flex;\n  flex-direction: column;\n  gap: 6px;\n}\n.tl-bullets li {\n  font-family: var(--sans);\n  font-size: 20px;\n  color: var(--charcoal);\n  line-height: 1.35;\n  padding-left: 18px;\n  position: relative;\n}\n.tl-bullets li::before {\n  content: \"\";\n  position: absolute;\n  left: 0;\n  top: 8px;\n  width: 6px; height: 6px;\n  background: var(--orange);\n  border-radius: 50%;\n}\n.tl-curve .curve-label {\n  font-family: var(--sans);\n  font-size: 20px;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  fill: var(--charcoal);\n  font-weight: 600;\n}\n\n/* --- Slide 15: Phone mockups --- */\n.phones {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 80px;\n  margin-top: 16px;\n  align-items: stretch;\n}\n.phone-stage {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 14px;\n}\n.phone-label {\n  font-family: var(--sans);\n  font-size: 24px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--orange);\n  font-weight: 600;\n}\n.phone-label.future { color: var(--gold); }\n.phone-caption {\n  font-family: var(--serif);\n  font-style: italic;\n  font-size: 24px;\n  color: var(--charcoal);\n  text-align: center;\n  text-wrap: balance;\n  max-width: 440px;\n  line-height: 1.3;\n}\n.phone {\n  width: 340px;\n  height: 540px;\n  background: var(--ink);\n  border-radius: 44px;\n  padding: 14px;\n  box-shadow: 0 30px 60px -20px rgba(27,34,41,0.4);\n  position: relative;\n}\n.phone::before {\n  content: \"\";\n  position: absolute;\n  top: 26px;\n  left: 50%;\n  transform: translateX(-50%);\n  width: 100px;\n  height: 24px;\n  background: var(--ink);\n  border-radius: 12px;\n  z-index: 5;\n}\n.phone-screen {\n  width: 100%;\n  height: 100%;\n  background: #F2EEE2;\n  border-radius: 32px;\n  padding: 56px 18px 18px;\n  display: flex;\n  flex-direction: column;\n  gap: 10px;\n  overflow: hidden;\n}\n.phone.dark .phone-screen {\n  background: #14191F;\n  color: var(--cream);\n}\n.phone-time {\n  text-align: center;\n  font-family: var(--sans);\n  font-size: 18px;\n  color: var(--charcoal);\n  font-weight: 600;\n  margin-bottom: 4px;\n}\n.phone.dark .phone-time { color: rgba(248,243,230,0.7); }\n\n.notif {\n  background: rgba(255,255,255,0.7);\n  border-radius: 14px;\n  padding: 12px 14px;\n  font-family: var(--sans);\n  font-size: 16px;\n  line-height: 1.4;\n  color: var(--charcoal);\n  display: grid;\n  grid-template-columns: 36px 1fr;\n  gap: 12px;\n}\n.phone.dark .notif {\n  background: rgba(248,243,230,0.08);\n  color: var(--cream);\n}\n.notif .ico {\n  width: 36px; height: 36px;\n  background: var(--charcoal);\n  color: var(--cream);\n  border-radius: 8px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  font-family: var(--serif);\n  font-style: italic;\n  font-weight: 600;\n  font-size: 18px;\n}\n.notif.alert .ico { background: var(--orange); }\n.notif .src {\n  font-size: 14px;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--charcoal);\n  opacity: 0.6;\n  font-weight: 600;\n  margin-bottom: 2px;\n}\n.phone.dark .notif .src { color: rgba(248,243,230,0.55); }\n.notif .ttl {\n  font-weight: 600;\n  font-size: 17px;\n  margin-bottom: 2px;\n}\n.notif .body-line {\n  font-size: 15px;\n  line-height: 1.45;\n  opacity: 0.85;\n}\n.notif.alert .ttl { color: var(--orange); }\n.phone.dark .notif.alert .ttl { color: var(--gold); }\n.notif .meta {\n  font-family: var(--mono);\n  font-size: 13px;\n  margin-top: 6px;\n  opacity: 0.75;\n  line-height: 1.5;\n}\n<\u002Fstyle>\n<style>/* Tweaks panel chrome + rhythm-driven cascading scale */\n\n#tweaks-panel {\n  position: fixed;\n  right: 24px;\n  bottom: 24px;\n  width: 320px;\n  background: var(--paper);\n  color: var(--charcoal);\n  border: 1px solid var(--rule-strong);\n  box-shadow: 0 24px 60px -16px rgba(0,0,0,0.35);\n  font-family: var(--sans);\n  z-index: 9999;\n  transform: translateY(20px);\n  opacity: 0;\n  pointer-events: none;\n  transition: opacity .18s ease, transform .18s ease;\n}\n#tweaks-panel.is-open {\n  transform: translateY(0);\n  opacity: 1;\n  pointer-events: auto;\n}\n\n#tweaks-panel .tp-head {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  padding: 14px 18px 12px;\n  border-bottom: 1px solid var(--rule);\n}\n#tweaks-panel .tp-title {\n  font-family: var(--serif);\n  font-size: 22px;\n  font-weight: 500;\n  font-style: italic;\n  color: var(--ink);\n}\n#tweaks-panel .tp-close {\n  background: transparent;\n  border: 0;\n  color: var(--charcoal);\n  font-size: 22px;\n  line-height: 1;\n  cursor: pointer;\n  padding: 4px 8px;\n  opacity: 0.6;\n}\n#tweaks-panel .tp-close:hover { opacity: 1; }\n\n#tweaks-panel .tp-body {\n  padding: 16px 18px 8px;\n  display: flex;\n  flex-direction: column;\n  gap: 18px;\n}\n#tweaks-panel .tp-foot {\n  padding: 10px 18px 14px;\n  font-size: 11px;\n  color: var(--charcoal);\n  opacity: 0.55;\n  border-top: 1px solid var(--rule);\n  font-style: italic;\n}\n\n#tweaks-panel .tp-label {\n  font-family: var(--sans);\n  font-size: 11px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--orange);\n  font-weight: 600;\n  margin-bottom: 2px;\n}\n#tweaks-panel .tp-tagline {\n  font-family: var(--serif);\n  font-size: 13px;\n  font-style: italic;\n  color: var(--charcoal);\n  opacity: 0.75;\n  margin-bottom: 10px;\n}\n\n#tweaks-panel .tp-radio {\n  display: grid;\n  grid-template-columns: 1fr 1fr 1fr;\n  gap: 8px;\n}\n#tweaks-panel .tp-chip {\n  background: var(--cream);\n  border: 1px solid var(--rule);\n  color: var(--charcoal);\n  padding: 10px 6px 8px;\n  cursor: pointer;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 6px;\n  transition: border-color .15s, background .15s;\n  font-family: var(--sans);\n}\n#tweaks-panel .tp-chip:hover { border-color: var(--rule-strong); }\n#tweaks-panel .tp-chip.is-active {\n  border-color: var(--orange);\n  background: var(--paper);\n  box-shadow: inset 0 -2px 0 var(--orange);\n}\n#tweaks-panel .tp-chip-label {\n  font-size: 11px;\n  font-weight: 500;\n  letter-spacing: 0.05em;\n  color: var(--ink);\n  text-align: center;\n  line-height: 1.2;\n}\n\n#tweaks-panel .tp-swatches {\n  display: flex;\n  width: 100%;\n  height: 22px;\n  border-radius: 0;\n  overflow: hidden;\n}\n#tweaks-panel .tp-swatches i {\n  flex: 1;\n  height: 100%;\n  display: block;\n}\n\n#tweaks-panel .tp-voice-glyph {\n  font-size: 24px;\n  line-height: 1;\n  color: var(--ink);\n  height: 28px;\n  display: flex;\n  align-items: center;\n}\n#tweaks-panel .tp-voice-glyph[data-voice=\"scholar\"] {\n  font-family: \"Crimson Pro\", Georgia, serif;\n  font-style: italic;\n  font-weight: 500;\n}\n#tweaks-panel .tp-voice-glyph[data-voice=\"modernist\"] {\n  font-family: \"Inter\", sans-serif;\n  font-weight: 700;\n  letter-spacing: -0.04em;\n}\n#tweaks-panel .tp-voice-glyph[data-voice=\"slab\"] {\n  font-family: \"Roboto Slab\", \"Crimson Pro\", Georgia, serif;\n  font-weight: 700;\n}\n\n#tweaks-panel .tp-seg {\n  display: grid;\n  grid-template-columns: 1fr 1fr 1fr;\n  border: 1px solid var(--rule);\n}\n#tweaks-panel .tp-seg-btn {\n  background: var(--cream);\n  border: 0;\n  border-right: 1px solid var(--rule);\n  padding: 9px 6px;\n  cursor: pointer;\n  font-family: var(--sans);\n  font-size: 12px;\n  letter-spacing: 0.06em;\n  color: var(--charcoal);\n  font-weight: 500;\n}\n#tweaks-panel .tp-seg-btn:last-child { border-right: 0; }\n#tweaks-panel .tp-seg-btn.is-active {\n  background: var(--orange);\n  color: var(--cream);\n}\n\n/* ============================================================\n   Rhythm: cascading density adjustments\n   --rhythm-scale tightens or expands typography\n   --rhythm-pad   tightens or expands slide padding\n   --rhythm-rule  scales gaps, line gutters\n   ============================================================ */\n\ndeck-stage {\n  --rhythm-scale: 1;\n  --rhythm-pad: 1;\n  --rhythm-rule: 1;\n}\n\ndeck-stage .slide-pad {\n  inset: calc(100px * var(--rhythm-pad)) calc(100px * var(--rhythm-pad)) calc(80px * var(--rhythm-pad)) calc(100px * var(--rhythm-pad));\n  gap: calc(var(--rhythm-rule) * 1em);\n}\n\n/* Scale typography subtly via letter-spacing only — never override font-size,\n   which is set per-class in styles.css */\n\nbody[data-rhythm=\"compact\"] deck-stage section { letter-spacing: -0.005em; }\nbody[data-rhythm=\"generous\"] deck-stage section { letter-spacing: 0.005em; }\n\n/* When in carbon mood: ensure generic body color flips */\nbody[data-mood=\"carbon\"] deck-stage section {\n  background: var(--cream);\n  color: var(--charcoal);\n}\nbody[data-mood=\"carbon\"] .phone.dark .phone-screen { background: #0A0D11; }\nbody[data-mood=\"carbon\"] .phone-screen { background: #1F242B; color: var(--charcoal); }\n\n/* Modernist voice: kill italics on display */\nbody[data-voice=\"modernist\"] em,\nbody[data-voice=\"modernist\"] .cover-title em,\nbody[data-voice=\"modernist\"] .title-md em,\nbody[data-voice=\"modernist\"] .title-lg em {\n  font-style: normal;\n  font-weight: 700;\n}\n\n/* Slab voice: tighten cover title leading */\nbody[data-voice=\"slab\"] .cover-title { line-height: 0.96; }\nbody[data-voice=\"slab\"] .title-md em,\nbody[data-voice=\"slab\"] .cover-title em { font-style: normal; }\n<\u002Fstyle>\n<script src=\"578f98e2-2937-485b-9532-27e5a1ce9cda\"><\u002Fscript>\n<script src=\"c013f9a0-88ca-4fbd-979e-e8526e4059a4\" defer=\"\"><\u002Fscript>\n<script type=\"application/json\" id=\"speaker-notes\">\n[\n\"Good afternoon, everyone. Thanks for making the time. Today I want to share something the Data to Insights team has been working on, and it's really about a fundamental question: when our campus leaders, our researchers, our analysts open a dashboard or pull a report, can they trust what they see? Is the data fresh? Did the pipeline run? Did it run successfully? Right now, the honest answer is that they often can't tell. So we set out to build what we're calling the Availability Dashboard — a way of making the reliability of our data pipelines visible, in a single, digestible place, to the people who depend on them. Over the next thirty minutes I'll walk you through the problem we saw, who benefits, the framework we're using, our phased rollout, and what the dashboard actually looks like.\",\n\n\"Quick word about who's standing in front of you. We're the Data to Insights team here at UT Austin — D2I for short. The folks on this project are data quality engineers by day, but really we think of ourselves as innovators. Our job is to make sure that when the university makes a decision based on data, that data deserves the trust placed in it. And the work I'm sharing today came directly out of that mission.\",\n\n\"Here's the problem we kept running into. Our data pipelines are, for most of our stakeholders, a black box. They submit a request, the pipeline runs, data appears in a dashboard — and when something goes wrong, the questions come flooding in. Is the data fresh? How often are we missing our load adherence SLAs? When a load fails, where in the lineage did it actually break? And probably the most painful one: is there any single number, any quick health score, that tells us whether our pipelines are doing okay overall? We didn't have great answers. Our goal with this work is to flip that — to move from reactive support, where we're firefighting after a stakeholder complains, to proactive transparency, where we surface trends and let leaders make informed decisions before the fire starts.\",\n\n\"Before I show you the solution, the most important question we asked ourselves was: who is this for? Because a dashboard built for everyone usually serves no one. So we spent real time on this question — who exactly is this dashboard supposed to help, and what do they actually need to see?\",\n\n\"We landed on three audiences, and they each get a different view of the same underlying data. Engineers — our own team and partners — they need heightened error detection and resolution. They want to see the failure log, the stack trace, the exact step that broke. Managers need drill-down capability — they need to know status, see failure history, and answer the question their director just walked into their office to ask. And executives need the opposite of detail. They need a high-level, quick, digestible view — green or red, are we healthy or not. One pipeline, three views.\",\n\n\"Here's the design principle that shaped everything that followed. Logging is not an afterthought. It cannot be something you bolt on after the pipeline is in production and an executive is asking why yesterday's report is missing. It has to be part of the pipeline development phase, the ETL phase, baked in from the first line of code. If you don't design for observability, you don't get observability. It's that simple.\",\n\n\"So how are we operationalizing that principle? Through what we're calling the Audit and Logging Framework. The architecture is decoupled — hub and spoke. The spokes are bespoke audit and reliability events that each pipeline emits. The hub is an OTEL Collector — the OpenTelemetry standard — that ingests everything centrally. The framework gives us standardized logs, metrics, traces, and events across every pipeline, regardless of who built it or what tech stack it's on. Consistency is the win here. One language for reliability across the whole campus.\",\n\n\"On top of that framework sits the metrics layer. This is the part that turns raw events into something a human being can actually read at a glance. We're tracking freshness, load success, SLA adherence, lineage health, and adoption. Each metric is intentionally chosen, and each maps cleanly to one of those three audiences I mentioned. The point of this slide is that we're not just collecting data for the sake of it — every metric has a question it answers and a person it answers it for.\",\n\n\"We're rolling this out in five phases — and I want to walk through each one, because the order matters. We start with foundational availability metrics: freshness, successful loads, SLA adherence. That's how we earn trust — the baseline that earns user confidence. Phase two adds reliability and diagnostics — failure causes and recovery frequency, so when something breaks we know why and can turn an outage into a solvable problem. Phase three is where it gets interesting — trend-based proactive detection. We stop reacting and start seeing the SLA decline before it crosses the line, catching data abnormalities early. Phase four brings in lineage and usage insights, so we can assess failure impact and prioritize the datasets that matter most to the campus. And phase five closes it out with quality and governance metrics — incident counts, alert configuration tuning, the kind of work that turns a noisy dashboard into a trusted one.\",\n\n\"Now I want to pivot for a moment, because availability isn't just about pipelines anymore. With ML and AI cloud platforms now widely available to our analysts, we're producing predictive models alongside traditional reports. And the same observability principle applies. AI and ML platforms make it easy to try multiple methods on the same data — but if no one is tracking which model is performing well, you're flying blind. So we work with the analysts to track model efficacy, accuracy, and stability. We log performance, accuracy, feature selection, coefficients — all the things that let you spot drift before a stakeholder spots it for you.\",\n\n\"Concretely, here's what we track for model health. RMSE for regression error. Confusion matrices for classification. Changes in features and feature weights — that's your early warning for drift. Precision tells us how accurate our positive predictions are. Recall tells us how many true positives we're catching. F1 combines them. None of this is exotic. The work isn't choosing the metrics — it's making sure they're logged, persisted, and visible alongside the rest of the dashboard, so model health gets the same first-class treatment as pipeline health.\",\n\n\"Before I show you what the dashboard looks like, I want to be honest about what we're depending on. Organizational readiness is on the assumption side — we're assuming the team can adopt the framework, that engineers will instrument their pipelines, that managers will check the dashboard. Platform readiness is on the dependency side — we need OTEL infrastructure, we need the data warehouse instrumented, we need the alerting layer to actually deliver. Neither of these is automatic. Both need investment, and both need executive air cover.\",\n\n\"Knowing those risks, here's how we're mitigating each one. For adoption, we're building developer-friendly templates so instrumentation isn't a chore. For platform infrastructure, we're partnering with central IT early, not at deployment time. For alert fatigue, we're tuning thresholds carefully and starting conservative. For governance, we're establishing ownership now, not retrofitting later. None of these are heroic. They're just the unglamorous work that keeps a project from stalling.\",\n\n\"Speaking of alerting — that's how we close the loop. A dashboard that nobody looks at is a dashboard that doesn't exist. So alerts go out across email, SMS, and our chat channels, and they stay in sync with the dashboard. The principle is: same source of truth, multiple delivery surfaces. If the dashboard says green, your inbox should not say red. If your phone buzzes at 2 AM, the dashboard explains why.\",\n\n\"Here's the contrast I want you to take away. Today, when a pipeline fails, our stakeholders find out because they open a report and the numbers look wrong. Tomorrow, with the new alerting in place, they get a clear, contextual notification — pipeline name, what failed, expected impact, owner, ETA. From silent failure to clear signal. That's the experience shift we're aiming for.\",\n\n\"And this is what the dashboard itself looks like. Three audiences, three views, all from the same underlying telemetry. The executive view at the top — overall health score, freshness, success rate. The manager view in the middle — pipeline-by-pipeline status with drill-down. The engineer view at the bottom — failure log, stack trace, lineage. Same data, calibrated for the question each person is asking.\",\n\n\"That's the work. The Audit and Logging Framework is in place, the metrics are defined, phase one rolls out next quarter. I'd love to hear your questions, your skepticism, and especially your suggestions for what we should be tracking that we aren't. Thank you.\"\n]\n<\u002Fscript>\n<\u002Fhead>\n<body>\n\n<deck-stage width=\"1920\" height=\"1080\">\n\n  <!-- ===== SLIDE 1 — COVER ===== -->\n  <section data-label=\"01 Cover\" class=\"no-chrome\">\n    <div class=\"cover\">\n      <div style=\"position:relative; max-width:1500px;\">\n        <h1 class=\"cover-title anim-fade-up\" style=\"--d:0.35s\">\n          The <em>Availability<\u002Fem><br>Dashboard.\n        <\u002Fh1>\n        <p class=\"cover-sub anim-fade-up\" style=\"--d:0.6s\">\n          Making data pipeline reliability<br>visible to campus leaders.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <!-- Animated dial -->\n      <div class=\"dial-wrap anim-fade-in\" style=\"--d:0.5s\">\n        <div class=\"dial\">\n          <svg viewBox=\"0 0 540 540\" aria-hidden=\"true\">\n            <!-- Background ring -->\n            <circle cx=\"270\" cy=\"270\" r=\"220\" fill=\"none\" stroke=\"rgba(51,63,72,0.12)\" stroke-width=\"2\"><\u002Fcircle>\n            <!-- pulse ring -->\n            <circle class=\"dial-pulse\" cx=\"270\" cy=\"270\" r=\"240\" fill=\"none\" stroke=\"rgba(191,87,0,0.4)\" stroke-width=\"1\" style=\"transform-origin:center;\"><\u002Fcircle>\n            <!-- Tick marks -->\n            <g stroke=\"rgba(51,63,72,0.4)\" stroke-width=\"2\">\n              <!-- major ticks -->\n              <line x1=\"270\" y1=\"60\" x2=\"270\" y2=\"80\"><\u002Fline>\n              <line x1=\"430\" y1=\"270\" x2=\"410\" y2=\"270\" transform=\"rotate(60 270 270)\"><\u002Fline>\n              <line x1=\"430\" y1=\"270\" x2=\"410\" y2=\"270\" transform=\"rotate(120 270 270)\"><\u002Fline>\n              <line x1=\"270\" y1=\"480\" x2=\"270\" y2=\"460\"><\u002Fline>\n              <line x1=\"110\" y1=\"270\" x2=\"130\" y2=\"270\" transform=\"rotate(60 270 270)\"><\u002Fline>\n              <line x1=\"110\" y1=\"270\" x2=\"130\" y2=\"270\" transform=\"rotate(120 270 270)\"><\u002Fline>\n            <\u002Fg>\n            <!-- minor ticks -->\n            <g stroke=\"rgba(51,63,72,0.25)\" stroke-width=\"1\">\n              <line x1=\"270\" y1=\"60\" x2=\"270\" y2=\"72\" transform=\"rotate(15 270 270)\"><\u002Fline>\n              <line x1=\"270\" y1=\"60\" x2=\"270\" y2=\"72\" transform=\"rotate(30 270 270)\"><\u002Fline>\n              <line x1=\"270\" y1=\"60\" x2=\"270\" y2=\"72\" transform=\"rotate(45 270 270)\"><\u002Fline>\n              <line x1=\"270\" y1=\"60\" x2=\"270\" y2=\"72\" transform=\"rotate(75 270 270)\"><\u002Fline>\n              <line x1=\"270\" y1=\"60\" x2=\"270\" y2=\"72\" transform=\"rotate(90 270 270)\"><\u002Fline>\n              <line x1=\"270\" y1=\"60\" x2=\"270\" y2=\"72\" transform=\"rotate(105 270 270)\"><\u002Fline>\n              <line x1=\"270\" y1=\"60\" x2=\"270\" y2=\"72\" transform=\"rotate(135 270 270)\"><\u002Fline>\n              <line x1=\"270\" y1=\"60\" x2=\"270\" y2=\"72\" transform=\"rotate(150 270 270)\"><\u002Fline>\n              <line x1=\"270\" y1=\"60\" x2=\"270\" y2=\"72\" transform=\"rotate(165 270 270)\"><\u002Fline>\n              <line x1=\"270\" y1=\"60\" x2=\"270\" y2=\"72\" transform=\"rotate(195 270 270)\"><\u002Fline>\n              <line x1=\"270\" y1=\"60\" x2=\"270\" y2=\"72\" transform=\"rotate(210 270 270)\"><\u002Fline>\n              <line x1=\"270\" y1=\"60\" x2=\"270\" y2=\"72\" transform=\"rotate(225 270 270)\"><\u002Fline>\n              <line x1=\"270\" y1=\"60\" x2=\"270\" y2=\"72\" transform=\"rotate(255 270 270)\"><\u002Fline>\n              <line x1=\"270\" y1=\"60\" x2=\"270\" y2=\"72\" transform=\"rotate(270 270 270)\"><\u002Fline>\n              <line x1=\"270\" y1=\"60\" x2=\"270\" y2=\"72\" transform=\"rotate(285 270 270)\"><\u002Fline>\n              <line x1=\"270\" y1=\"60\" x2=\"270\" y2=\"72\" transform=\"rotate(315 270 270)\"><\u002Fline>\n              <line x1=\"270\" y1=\"60\" x2=\"270\" y2=\"72\" transform=\"rotate(330 270 270)\"><\u002Fline>\n              <line x1=\"270\" y1=\"60\" x2=\"270\" y2=\"72\" transform=\"rotate(345 270 270)\"><\u002Fline>\n            <\u002Fg>\n            <!-- Filled arc -->\n            <path class=\"dial-arc\" d=\"M 110 350 A 200 200 0 1 1 430 350\" fill=\"none\" stroke=\"#BF5700\" stroke-width=\"14\" stroke-linecap=\"round\" transform=\"rotate(-15 270 270)\"><\u002Fpath>\n            <!-- Needle -->\n            <g class=\"dial-needle\">\n              <line x1=\"270\" y1=\"270\" x2=\"270\" y2=\"100\" stroke=\"#1B2229\" stroke-width=\"4\" stroke-linecap=\"round\"><\u002Fline>\n              <circle cx=\"270\" cy=\"270\" r=\"14\" fill=\"#1B2229\"><\u002Fcircle>\n              <circle cx=\"270\" cy=\"270\" r=\"5\" fill=\"#D6A461\"><\u002Fcircle>\n            <\u002Fg>\n            <!-- center labels -->\n            <text x=\"270\" y=\"380\" text-anchor=\"middle\" font-family=\"Crimson Pro, serif\" font-size=\"76\" font-weight=\"500\" fill=\"#1B2229\" font-style=\"italic\">98.4<\u002Ftext>\n            <text x=\"270\" y=\"424\" text-anchor=\"middle\" font-family=\"Inter, sans-serif\" font-size=\"24\" letter-spacing=\"4\" fill=\"#333F48\" font-weight=\"600\">AVAILABILITY · %<\u002Ftext>\n          <\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== SLIDE 2 — Speakers ===== -->\n  <section data-label=\"02 Who we are\">\n\n    <div class=\"slide-pad\">\n      <div class=\"eyebrow anim-fade-up\" style=\"--d:0.1s\">Who's standing in front of you<\u002Fdiv>\n      <h2 class=\"title-serif anim-fade-up\" style=\"--d:0.2s\">\n        We're <em style=\"color:var(--orange); font-style:italic;\">Data&nbsp;to&nbsp;Insights<\u002Fem>,<br>and we obsess over data trust.\n      <\u002Fh2>\n\n      <div class=\"speakers-row\">\n        <div class=\"speaker anim-fade-up\" style=\"--d:0.4s\">\n          <div class=\"pill\">D2I<\u002Fdiv>\n          <div class=\"label\">Data to Insights<\u002Fdiv>\n          <div class=\"sub\">Central data and analytics unit under Enterprise Technology.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"speaker anim-fade-up\" style=\"--d:0.55s\">\n          <div class=\"pill\">Role<\u002Fdiv>\n          <div class=\"label\">Data Quality Engineers<\u002Fdiv>\n          <div class=\"sub\">Perform quality assurance checks over critical data models.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"speaker anim-fade-up\" style=\"--d:0.7s\">\n          <div class=\"pill\">Mindset<\u002Fdiv>\n          <div class=\"label\">Innovators<\u002Fdiv>\n          <div class=\"sub\">Build futuristic automations and workflows.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- ===== SLIDE 3 — Black Box Problem ===== -->\n  <section data-label=\"03 Black box\">\n\n    <div class=\"slide-pad\">\n      <div class=\"eyebrow anim-fade-up\" style=\"--d:0.1s\">The Problem We're Solving<\u002Fdiv>\n      <h2 class=\"title-serif anim-fade-up\" style=\"--d:0.25s\">\n        The <em style=\"color:var(--orange); font-style:italic;\">Black&nbsp;Box<\u002Fem> Problem.\n      <\u002Fh2>\n\n      <div class=\"two-col\" style=\"margin-top:56px; gap:120px;\">\n        <div>\n          <div class=\"kicker-num anim-fade-up\" style=\"--d:0.45s\">Pain points stakeholders ask us<\u002Fdiv>\n          <ul class=\"pain-list\" style=\"margin-top:24px;\">\n            <li class=\"anim-fade-up\" style=\"--d:0.6s\">Is the data fresh?<\u002Fli>\n            <li class=\"anim-fade-up\" style=\"--d:0.75s\">How often are we missing our SLA?<\u002Fli>\n            <li class=\"anim-fade-up\" style=\"--d:0.9s\">Where in the lineage did it break?<\u002Fli>\n            <li class=\"anim-fade-up statement\" style=\"--d:1.05s\">No single, digestible health score exists.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <div>\n          <div class=\"kicker-num anim-fade-up\" style=\"--d:1.2s\">Where we want to go<\u002Fdiv>\n          <p class=\"subtitle anim-fade-up\" style=\"--d:1.35s; margin-top:24px;\">\n            From <strong style=\"color:var(--orange); font-style:normal;\">reactive&nbsp;support<\u002Fstrong> — firefighting after a stakeholder complains — to <strong style=\"color:var(--orange); font-style:normal;\">proactive&nbsp;transparency<\u002Fstrong>: trends, signals, decisions made early.\n          <\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Pulse line at the bottom -->\n    <div class=\"pulse-line\" aria-hidden=\"true\">\n      <svg viewBox=\"0 0 1700 120\" preserveAspectRatio=\"none\">\n        <path class=\"pulse-path\" d=\"M 0 60 L 200 60 L 240 60 L 280 30 L 320 90 L 360 60 L 800 60 L 840 60 L 870 20 L 900 100 L 930 60 L 1700 60\" fill=\"none\" stroke=\"#BF5700\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n      <\u002Fsvg>\n    <\u002Fdiv>\n\n\n  <\u002Fsection>\n\n  <!-- ===== SLIDE 4 — Section Header: Who are you? ===== -->\n  <section data-label=\"04 Who are you\">\n    <div class=\"section-hero\">\n      <div class=\"num-mark anim-fade-in\" style=\"--d:0.2s\">04<\u002Fdiv>\n      <div>\n        <h1 class=\"anim-fade-up\" style=\"--d:0.3s\">\n          But first —<br><em>who are you?<\u002Fem>\n        <\u002Fh1>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== SLIDE 5 — Three audiences ===== -->\n  <section data-label=\"05 Audiences\">\n\n    <div class=\"slide-pad\" style=\"gap: 0px\">\n      <div class=\"eyebrow anim-fade-up\" style=\"--d:0.1s\">One pipeline · three views<\u002Fdiv>\n      <h2 class=\"title-serif anim-fade-up\" style=\"--d:0.25s\">\n        Three audiences benefit,<br>each calibrated <em style=\"color:var(--orange); font-style:italic;\">differently<\u002Fem>.\n      <\u002Fh2>\n\n      <div class=\"lens-fan\" style=\"padding: 0px 0px 9px; margin: 56px 399.969px 46px; border-width: 0px 0px 23px; border-style: solid\">\n        <div class=\"lens-source anim-fade-up\" style=\"--d:0.4s\">\n          <div class=\"pipe-icon\">\n            <span class=\"small\">One<\u002Fspan>\n            Pipeline\n          <\u002Fdiv>\n          <div class=\"pipe-label\">Single Source<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"lens-targets\">\n          <svg class=\"lens-svg\" viewBox=\"0 0 200 540\" preserveAspectRatio=\"none\" aria-hidden=\"true\">\n            <path d=\"M 0 270 L 100 270 L 200 80\" class=\"connector-line\"><\u002Fpath>\n            <path d=\"M 0 270 L 200 270\" class=\"connector-line\"><\u002Fpath>\n            <path d=\"M 0 270 L 100 270 L 200 460\" class=\"connector-line\"><\u002Fpath>\n          <\u002Fsvg>\n          <div class=\"lens-card anim-fade-up\" style=\"--d:0.55s\">\n            <div>\n              <div class=\"lens-num\">i.<\u002Fdiv>\n              <div class=\"lens-role\">Engineers<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"lens-vis\">\n              10:24 <span class=\"bad\">ERR<\u002Fspan> stage_to_dim<br>\n              10:23 <span class=\"warn\">WARN<\u002Fspan> latency p95<br>\n              10:22 <span class=\"ok\">OK<\u002Fspan>&nbsp; load complete\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"lens-card anim-fade-up\" style=\"--d:0.7s\">\n            <div>\n              <div class=\"lens-num\">ii.<\u002Fdiv>\n              <div class=\"lens-role\">Managers<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"lens-vis\">\n              <span class=\"ok\">●<\u002Fspan> enrollment_daily &nbsp; on time<br>\n              <span class=\"warn\">●<\u002Fspan> course_catalog &nbsp; +12 min<br>\n              <span class=\"bad\">●<\u002Fspan> research_funding &nbsp; failed\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"lens-card anim-fade-up\" style=\"--d:0.85s\">\n            <div>\n              <div class=\"lens-num\">iii.<\u002Fdiv>\n              <div class=\"lens-role\">Executives<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"lens-vis\">\n              <span class=\"big\">98.4<span style=\"font-size:32px;\">%<\u002Fspan><\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- ===== SLIDE 6 — Design-first principle ===== -->\n  <section data-label=\"06 Design-first\">\n\n    <div class=\"slide-pad\" style=\"justify-content:center;\">\n      <div class=\"eyebrow anim-fade-up\" style=\"--d:0.1s; text-align:center;\">A Design Principle<\u002Fdiv>\n      <p class=\"pull anim-fade-up\" style=\"--d:0.3s; text-align:center; max-width:1500px; margin:24px auto 48px;\">\n        Logging should <em>not<\u002Fem> be an afterthought.\n      <\u002Fp>\n      <div class=\"anim-fade-in\" style=\"--d:0.7s; display:flex; justify-content:center;\">\n        <div class=\"thick-rule\"><\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"pull anim-fade-up\" style=\"--d:0.9s; text-align:center; max-width:1500px; margin:24px auto 0; font-size:72px;\">\n        It must be part of the <em>early design<\u002Fem><br>and modeling phase.\n      <\u002Fp>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- ===== SLIDE 7 — Audit & Logging Framework ===== -->\n  <section data-label=\"07 Framework\">\n\n    <div class=\"slide-pad\" style=\"gap:0;\">\n      <div class=\"eyebrow anim-fade-up\" style=\"--d:0.1s\">Audit &amp; Logging Framework<\u002Fdiv>\n      <h2 class=\"title-md anim-fade-up\" style=\"--d: 0.25s; font-size: 48px; margin-bottom: 8px; margin: 29px 0px 74px\">\n        One language for reliability,<br>spoken across <em style=\"color:var(--orange); font-style:italic;\">every<\u002Fem> pipeline.\n      <\u002Fh2>\n\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:40px; margin-top:4px;\">\n\n        <!-- ===== LEFT: Bespoke Decoupled ===== -->\n        <div class=\"anim-fade-up\" style=\"--d:0.4s;\">\n          <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:12px;\">\n            <span style=\"font-family:var(--sans); font-size:18px; letter-spacing:0.2em; text-transform:uppercase; color:var(--charcoal); font-weight:600;\">Bespoke Decoupled<\u002Fspan>\n            <span style=\"display:inline-block; padding:3px 10px; background:#D87065; color:#fff; font-family:var(--sans); font-size:13px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase;\">Fragmented<\u002Fspan>\n          <\u002Fdiv>\n\n          <svg viewBox=\"0 0 760 260\" style=\"width:100%; display:block;\" aria-hidden=\"true\">\n            <rect x=\"40\" y=\"4\" width=\"180\" height=\"38\" rx=\"4\" fill=\"#1B2229\" stroke=\"#BF5700\" stroke-width=\"1.5\"><\u002Frect>\n            <text x=\"130\" y=\"28\" text-anchor=\"middle\" font-family=\"var(--serif)\" font-size=\"20\" font-weight=\"500\" fill=\"var(--cream)\">Pipe A<\u002Ftext>\n            <rect x=\"290\" y=\"4\" width=\"180\" height=\"38\" rx=\"4\" fill=\"#1B2229\" stroke=\"#BF5700\" stroke-width=\"1.5\"><\u002Frect>\n            <text x=\"380\" y=\"28\" text-anchor=\"middle\" font-family=\"var(--serif)\" font-size=\"20\" font-weight=\"500\" fill=\"var(--cream)\">Pipe B<\u002Ftext>\n            <rect x=\"540\" y=\"4\" width=\"180\" height=\"38\" rx=\"4\" fill=\"#1B2229\" stroke=\"#BF5700\" stroke-width=\"1.5\"><\u002Frect>\n            <text x=\"630\" y=\"28\" text-anchor=\"middle\" font-family=\"var(--serif)\" font-size=\"20\" font-weight=\"500\" fill=\"var(--cream)\">Pipe C<\u002Ftext>\n            <line x1=\"130\" y1=\"42\" x2=\"130\" y2=\"92\" stroke=\"var(--rule-strong)\" stroke-width=\"1.5\" stroke-dasharray=\"5 5\"><\u002Fline>\n            <line x1=\"380\" y1=\"42\" x2=\"380\" y2=\"92\" stroke=\"var(--rule-strong)\" stroke-width=\"1.5\" stroke-dasharray=\"5 5\"><\u002Fline>\n            <line x1=\"630\" y1=\"42\" x2=\"630\" y2=\"92\" stroke=\"var(--rule-strong)\" stroke-width=\"1.5\" stroke-dasharray=\"5 5\"><\u002Fline>\n            <text x=\"380\" y=\"74\" text-anchor=\"middle\" font-family=\"var(--sans)\" font-size=\"12\" fill=\"var(--charcoal)\" opacity=\"0.7\" font-style=\"italic\">no shared schema · custom format each<\u002Ftext>\n            <rect x=\"40\" y=\"92\" width=\"180\" height=\"38\" rx=\"4\" fill=\"#FBF8EE\" stroke=\"#B8761F\" stroke-width=\"1.5\"><\u002Frect>\n            <text x=\"130\" y=\"116\" text-anchor=\"middle\" font-family=\"var(--mono)\" font-size=\"16\" font-weight=\"500\" fill=\"#7A5520\">Custom A<\u002Ftext>\n            <rect x=\"290\" y=\"92\" width=\"180\" height=\"38\" rx=\"4\" fill=\"#FBF8EE\" stroke=\"#4A7BAD\" stroke-width=\"1.5\"><\u002Frect>\n            <text x=\"380\" y=\"116\" text-anchor=\"middle\" font-family=\"var(--mono)\" font-size=\"16\" font-weight=\"500\" fill=\"#2F5A7E\">AWS<\u002Ftext>\n            <rect x=\"540\" y=\"92\" width=\"180\" height=\"38\" rx=\"4\" fill=\"#FBF8EE\" stroke=\"#7B5A96\" stroke-width=\"1.5\"><\u002Frect>\n            <text x=\"630\" y=\"116\" text-anchor=\"middle\" font-family=\"var(--mono)\" font-size=\"16\" font-weight=\"500\" fill=\"#5C3D75\">Databricks<\u002Ftext>\n            <line x1=\"130\" y1=\"130\" x2=\"130\" y2=\"180\" stroke=\"var(--rule-strong)\" stroke-width=\"1.5\" stroke-dasharray=\"5 5\"><\u002Fline>\n            <line x1=\"380\" y1=\"130\" x2=\"380\" y2=\"180\" stroke=\"var(--rule-strong)\" stroke-width=\"1.5\" stroke-dasharray=\"5 5\"><\u002Fline>\n            <line x1=\"630\" y1=\"130\" x2=\"630\" y2=\"180\" stroke=\"var(--rule-strong)\" stroke-width=\"1.5\" stroke-dasharray=\"5 5\"><\u002Fline>\n            <text x=\"380\" y=\"162\" text-anchor=\"middle\" font-family=\"var(--sans)\" font-size=\"12\" fill=\"var(--charcoal)\" opacity=\"0.7\" font-style=\"italic\">siloed · no cross-pipeline visibility<\u002Ftext>\n            <rect x=\"40\" y=\"180\" width=\"180\" height=\"38\" rx=\"4\" fill=\"#FBF8EE\" stroke=\"#B8761F\" stroke-width=\"1.5\"><\u002Frect>\n            <text x=\"130\" y=\"204\" text-anchor=\"middle\" font-family=\"var(--mono)\" font-size=\"16\" font-weight=\"500\" fill=\"#7A5520\">Splunk<\u002Ftext>\n            <rect x=\"290\" y=\"180\" width=\"180\" height=\"38\" rx=\"4\" fill=\"#FBF8EE\" stroke=\"#4A7BAD\" stroke-width=\"1.5\"><\u002Frect>\n            <text x=\"380\" y=\"204\" text-anchor=\"middle\" font-family=\"var(--mono)\" font-size=\"16\" font-weight=\"500\" fill=\"#2F5A7E\">CloudWatch<\u002Ftext>\n            <rect x=\"540\" y=\"180\" width=\"180\" height=\"38\" rx=\"4\" fill=\"#FBF8EE\" stroke=\"#7B5A96\" stroke-width=\"1.5\"><\u002Frect>\n            <text x=\"630\" y=\"204\" text-anchor=\"middle\" font-family=\"var(--mono)\" font-size=\"16\" font-weight=\"500\" fill=\"#5C3D75\">AuditLog<\u002Ftext>\n          <\u002Fsvg>\n        <\u002Fdiv>\n\n        <!-- ===== RIGHT: OTEL Hub & Spoke ===== -->\n        <div class=\"anim-fade-up\" style=\"--d:0.65s;\">\n          <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:12px;\">\n            <span style=\"font-family:var(--sans); font-size:18px; letter-spacing:0.2em; text-transform:uppercase; color:var(--charcoal); font-weight:600;\">Open Telemetry Hub &amp; Spoke<\u002Fspan>\n            <span style=\"display:inline-block; padding:3px 10px; background:#2F7D5B; color:#fff; font-family:var(--sans); font-size:13px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase;\">Recommended<\u002Fspan>\n          <\u002Fdiv>\n\n          <svg viewBox=\"0 0 760 260\" style=\"width:100%; display:block;\" aria-hidden=\"true\">\n            <rect x=\"40\" y=\"4\" width=\"180\" height=\"38\" rx=\"4\" fill=\"var(--paper)\" stroke=\"var(--rule-strong)\" stroke-width=\"1.5\"><\u002Frect>\n            <text x=\"130\" y=\"28\" text-anchor=\"middle\" font-family=\"var(--serif)\" font-size=\"20\" font-weight=\"500\" fill=\"var(--ink)\" style=\"fill: rgb(248, 243, 230)\">Pipe A<\u002Ftext>\n            <rect x=\"290\" y=\"4\" width=\"180\" height=\"38\" rx=\"4\" fill=\"var(--paper)\" stroke=\"var(--rule-strong)\" stroke-width=\"1.5\"><\u002Frect>\n            <text x=\"380\" y=\"28\" text-anchor=\"middle\" font-family=\"var(--serif)\" font-size=\"20\" font-weight=\"500\" fill=\"var(--ink)\" style=\"fill: rgb(248, 243, 230)\">Pipe B<\u002Ftext>\n            <rect x=\"540\" y=\"4\" width=\"180\" height=\"38\" rx=\"4\" fill=\"var(--paper)\" stroke=\"var(--rule-strong)\" stroke-width=\"1.5\"><\u002Frect>\n            <text x=\"630\" y=\"28\" text-anchor=\"middle\" font-family=\"var(--serif)\" font-size=\"20\" font-weight=\"500\" fill=\"var(--ink)\" style=\"fill: rgb(248, 243, 230)\">Pipe C<\u002Ftext>\n            <line x1=\"130\" y1=\"42\" x2=\"380\" y2=\"100\" stroke=\"var(--orange)\" stroke-width=\"2\"><\u002Fline>\n            <line x1=\"380\" y1=\"42\" x2=\"380\" y2=\"100\" stroke=\"var(--orange)\" stroke-width=\"2\"><\u002Fline>\n            <line x1=\"630\" y1=\"42\" x2=\"380\" y2=\"100\" stroke=\"var(--orange)\" stroke-width=\"2\"><\u002Fline>\n            <text x=\"380\" y=\"76\" text-anchor=\"middle\" font-family=\"var(--sans)\" font-size=\"12\" fill=\"var(--orange)\" opacity=\"0.85\" font-style=\"italic\">standardized OTel protocol · auto-correlated<\u002Ftext>\n            <rect x=\"280\" y=\"100\" width=\"200\" height=\"56\" rx=\"8\" fill=\"var(--ink)\" stroke=\"var(--orange)\" stroke-width=\"2\"><\u002Frect>\n            <text x=\"380\" y=\"124\" text-anchor=\"middle\" font-family=\"var(--serif)\" font-size=\"22\" font-weight=\"500\" fill=\"var(--cream)\" font-style=\"italic\">OTEL Collector<\u002Ftext>\n            <text x=\"380\" y=\"146\" text-anchor=\"middle\" font-family=\"var(--sans)\" font-size=\"12\" fill=\"var(--gold)\" letter-spacing=\"2\" font-weight=\"600\">VENDOR-AGNOSTIC HUB<\u002Ftext>\n            <line x1=\"380\" y1=\"156\" x2=\"130\" y2=\"190\" stroke=\"var(--orange)\" stroke-width=\"2\"><\u002Fline>\n            <line x1=\"380\" y1=\"156\" x2=\"380\" y2=\"190\" stroke=\"var(--orange)\" stroke-width=\"2\"><\u002Fline>\n            <line x1=\"380\" y1=\"156\" x2=\"630\" y2=\"190\" stroke=\"var(--orange)\" stroke-width=\"2\"><\u002Fline>\n            <text x=\"380\" y=\"180\" text-anchor=\"middle\" font-family=\"var(--sans)\" font-size=\"12\" fill=\"var(--orange)\" opacity=\"0.85\" font-style=\"italic\">unified backends · full pipeline visibility<\u002Ftext>\n            <rect x=\"40\" y=\"190\" width=\"180\" height=\"38\" rx=\"4\" fill=\"var(--ink)\" stroke=\"var(--orange)\" stroke-width=\"1.5\"><\u002Frect>\n            <text x=\"130\" y=\"214\" text-anchor=\"middle\" font-family=\"var(--mono)\" font-size=\"16\" font-weight=\"500\" fill=\"var(--cream)\">Metrics<\u002Ftext>\n            <rect x=\"290\" y=\"190\" width=\"180\" height=\"38\" rx=\"4\" fill=\"var(--ink)\" stroke=\"var(--orange)\" stroke-width=\"1.5\"><\u002Frect>\n            <text x=\"380\" y=\"214\" text-anchor=\"middle\" font-family=\"var(--mono)\" font-size=\"16\" font-weight=\"500\" fill=\"var(--cream)\">Traces<\u002Ftext>\n            <rect x=\"540\" y=\"190\" width=\"180\" height=\"38\" rx=\"4\" fill=\"var(--ink)\" stroke=\"var(--orange)\" stroke-width=\"1.5\"><\u002Frect>\n            <text x=\"630\" y=\"214\" text-anchor=\"middle\" font-family=\"var(--mono)\" font-size=\"16\" font-weight=\"500\" fill=\"var(--cream)\">Logs<\u002Ftext>\n          <\u002Fsvg>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n      <!-- ===== Comparison Scorecard ===== -->\n      <table class=\"fw-table anim-fade-up\" style=\"--d:0.9s; margin-top:12px;\">\n        <thead>\n          <tr>\n            <th style=\"width:28%; padding:14px 16px;\">Factors<\u002Fth>\n            <th style=\"width:36%; padding:14px 16px;\">Bespoke<\u002Fth>\n            <th style=\"width:36%; padding:14px 16px;\">OTEL<\u002Fth>\n          <\u002Ftr>\n        <\u002Fthead>\n        <tbody>\n          <tr>\n            <td style=\"padding:10px 16px; font-size:24px;\">Consistency<\u002Ftd>\n            <td style=\"padding:10px 16px; font-size:24px;\"><span style=\"color:#D87065; font-weight:600;\">No standard schema<\u002Fspan><\u002Ftd>\n            <td style=\"padding:10px 16px; font-size:24px;\"><span style=\"color:#2F7D5B; font-weight:600;\">Unified OTel format<\u002Fspan><\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td style=\"padding:10px 16px; font-size:24px;\">Cross-pipeline<\u002Ftd>\n            <td style=\"padding:10px 16px; font-size:24px;\"><span style=\"color:#D87065; font-weight:600;\">Difficult<\u002Fspan><\u002Ftd>\n            <td style=\"padding:10px 16px; font-size:24px;\"><span style=\"color:#2F7D5B; font-weight:600;\">Built-in trace IDs<\u002Fspan><\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td style=\"padding:10px 16px; font-size:24px;\">Visualization<\u002Ftd>\n            <td style=\"padding:10px 16px; font-size:24px;\"><span style=\"color:#D87065; font-weight:600;\">N siloed dashboards<\u002Fspan><\u002Ftd>\n            <td style=\"padding:10px 16px; font-size:24px;\"><span style=\"color:#2F7D5B; font-weight:600;\">Single pane of glass<\u002Fspan><\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td style=\"padding:10px 16px; font-size:24px;\">Scalability<\u002Ftd>\n            <td style=\"padding:10px 16px; font-size:24px;\"><span style=\"color: rgb(216, 112, 101); font-weight: 600\">Linear manual effort<\u002Fspan><\u002Ftd>\n            <td style=\"padding:10px 16px; font-size:24px;\"><span style=\"color:#2F7D5B; font-weight:600;\">Horizontal scale<\u002Fspan><\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td style=\"padding:10px 16px; font-size:24px;\">Operational burden<\u002Ftd>\n            <td style=\"padding:10px 16px; font-size:24px;\"><span style=\"color:#D87065; font-weight:600;\">High — N tool stacks<\u002Fspan><\u002Ftd>\n            <td style=\"padding:10px 16px; font-size:24px;\"><span style=\"c
