olor:#2F7D5B; font-weight:600;\">Low — 1 stack<\u002Fspan><\u002Ftd>\n          <\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- ===== SLIDE 8 — Metrics ===== -->\n  <section data-label=\"08 Metrics\">\n\n    <div class=\"slide-pad\">\n      <div class=\"eyebrow anim-fade-up\" style=\"--d:0.1s\">Metrics<\u002Fdiv>\n      <h2 class=\"title-serif anim-fade-up\" style=\"--d:0.25s\">\n        Metrics make reliability<br><em style=\"color:var(--orange); font-style:italic;\">legible<\u002Fem>.\n      <\u002Fh2>\n\n      <div class=\"metric-grid\">\n        <div class=\"metric-tile anim-fade-up\" style=\"--d:0.45s\">\n          <div class=\"num\">99.4<span style=\"font-size:48px;\">%<\u002Fspan><\u002Fdiv>\n          <div class=\"lab\">Freshness<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"metric-tile anim-fade-up\" style=\"--d:0.6s\">\n          <div class=\"num\">142<\u002Fdiv>\n          <div class=\"lab\">Successful Loads · 24h<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"metric-tile anim-fade-up\" style=\"--d:0.75s\">\n          <div class=\"num\">3<\u002Fdiv>\n          <div class=\"lab\">SLA Breaches · 30d<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- ===== SLIDE 9 — Phased Timeline ===== -->\n  <section data-label=\"09 Phased timeline\">\n\n    <div class=\"slide-pad\">\n      <div class=\"eyebrow anim-fade-up\" style=\"--d:0.1s\">Roadmap<\u002Fdiv>\n      <h2 class=\"title-md anim-fade-up\" style=\"--d:0.25s\">\n        We're rolling out in <em style=\"color:var(--orange); font-style:italic;\">five<\u002Fem> phases.\n      <\u002Fh2>\n\n      <div class=\"tl-wrap anim-fade-up\" style=\"--d:0.5s\">\n        <div class=\"tl-curve\">\n          <svg viewBox=\"0 0 2400 200\" preserveAspectRatio=\"none\" aria-hidden=\"true\">\n            <!-- y-axis label -->\n            <text x=\"20\" y=\"28\" class=\"curve-label\">Trust →<\u002Ftext>\n            <!-- cumulative trust curve: stair-step rising at each phase -->\n            <path class=\"curve-fill\" d=\"M 0 200 L 0 180 L 480 180 L 480 145 L 960 145 L 960 105 L 1440 105 L 1440 65 L 1920 65 L 1920 28 L 2400 28 L 2400 200 Z\" fill=\"var(--orange)\"><\u002Fpath>\n            <path class=\"curve-path\" d=\"M 0 180 L 480 180 L 480 145 L 960 145 L 960 105 L 1440 105 L 1440 65 L 1920 65 L 1920 28 L 2400 28\" fill=\"none\" stroke=\"var(--orange)\" stroke-width=\"3\" stroke-linejoin=\"miter\"><\u002Fpath>\n            <!-- phase markers -->\n            <circle cx=\"240\" cy=\"180\" r=\"8\" fill=\"var(--orange)\"><\u002Fcircle>\n            <circle cx=\"720\" cy=\"145\" r=\"8\" fill=\"var(--orange)\"><\u002Fcircle>\n            <circle cx=\"1200\" cy=\"105\" r=\"8\" fill=\"var(--orange)\"><\u002Fcircle>\n            <circle cx=\"1680\" cy=\"65\" r=\"8\" fill=\"var(--orange)\"><\u002Fcircle>\n            <circle cx=\"2160\" cy=\"28\" r=\"8\" fill=\"var(--orange)\"><\u002Fcircle>\n          <\u002Fsvg>\n        <\u002Fdiv>\n\n        <div class=\"tl-axis\">\n          <div class=\"tl-tick\">\n            <div class=\"tl-num\">Phase i.<\u002Fdiv>\n            <div class=\"tl-title\">Foundational Availability<\u002Fdiv>\n            <ul class=\"tl-bullets\"><li>Data Freshness<\u002Fli><li>Load Success Rate&nbsp;<\u002Fli><li>Load Adherence Rate (SLA)<\u002Fli><\u002Ful>\n          <\u002Fdiv>\n          <div class=\"tl-tick\">\n            <div class=\"tl-num\">Phase ii.<\u002Fdiv>\n            <div class=\"tl-title\">Reliability &amp; Diagnostics<\u002Fdiv>\n            <ul class=\"tl-bullets\"><li>Error Analysis&nbsp;<\u002Fli><li>Historical Load Time<\u002Fli><\u002Ful>\n          <\u002Fdiv>\n          <div class=\"tl-tick\">\n            <div class=\"tl-num\">Phase iii.<\u002Fdiv>\n            <div class=\"tl-title\">Trend-Based Detection<\u002Fdiv>\n            <ul class=\"tl-bullets\"><li>SLA Breach Trend<\u002Fli><li>Data Growth Rate<\u002Fli><\u002Ful>\n          <\u002Fdiv>\n          <div class=\"tl-tick\">\n            <div class=\"tl-num\">Phase iv.<\u002Fdiv>\n            <div class=\"tl-title\">Lineage &amp; Usage<\u002Fdiv>\n            <ul class=\"tl-bullets\"><li>Data Dependency Mapping<\u002Fli><li>Adoption Metrics<\u002Fli><\u002Ful>\n          <\u002Fdiv>\n          <div class=\"tl-tick\">\n            <div class=\"tl-num\">Phase v.<\u002Fdiv>\n            <div class=\"tl-title\">Quality &amp; Governance<\u002Fdiv>\n            <ul class=\"tl-bullets\"><li>Data Quality Incident Counts<\u002Fli><li>Threshold and Alert Configuration&nbsp;<\u002Fli><\u002Ful>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- ===== SLIDE 10 — Models benefit ===== -->\n  <section data-label=\"10 Models benefit\">\n\n    <div class=\"slide-pad\">\n      <div class=\"eyebrow anim-fade-up\" style=\"--d:0.1s\">Beyond Pipelines<\u002Fdiv>\n      <h2 class=\"title-serif anim-fade-up\" style=\"--d:0.25s\">\n        Models deserve<br>dashboards <em style=\"color:var(--orange); font-style:italic;\">too<\u002Fem>.\n      <\u002Fh2>\n\n      <div class=\"two-col\" style=\"margin-top:64px; gap:96px;\">\n        <div>\n          <p class=\"body-text anim-fade-up\" style=\"--d:0.5s\">With ML and AI cloud platforms now in every analyst's toolkit, our team produces predictive models alongside traditional reports — and the same observability principle applies.<\u002Fp>\n          <p class=\"body-text anim-fade-up\" style=\"--d:0.7s; margin-top:32px;\">Tracking efficacy and accuracy gives a concise view of model performance and stability over time.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <p class=\"body-text anim-fade-up\" style=\"--d:0.9s\">Logging performance, accuracy, feature selection, and coefficients lets us spot <em style=\"font-family:var(--serif); color:var(--orange); font-style:italic;\">drift<\u002Fem> before a stakeholder spots it for us.<\u002Fp>\n          <p class=\"body-text anim-fade-up\" style=\"--d:1.1s; margin-top:32px;\">Same first-class treatment, same campus dashboard, same audience-aware views.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- ===== SLIDE 11 — Model health metrics ===== -->\n  <section data-label=\"11 Model health\">\n\n    <div class=\"slide-pad\">\n      <div class=\"eyebrow anim-fade-up\" style=\"--d:0.1s\">Tracking Model Health &amp; Persistence<\u002Fdiv>\n      <h2 class=\"title-md anim-fade-up\" style=\"--d:0.25s\">\n        Six signals we watch<br>for <em style=\"color:var(--orange); font-style:italic;\">drift<\u002Fem> &amp; decay.\n      <\u002Fh2>\n\n      <div class=\"model-grid\">\n        <div class=\"model-item anim-fade-up\" style=\"--d:0.45s\">\n          <div class=\"term\">RMSE<\u002Fdiv>\n          <div class=\"def\">Root-mean-square error — baseline regression-error tracking.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"model-item anim-fade-up\" style=\"--d:0.55s\">\n          <div class=\"term\">Confusion Matrix<\u002Fdiv>\n          <div class=\"def\">Truth-table view for classification accuracy at a glance.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"model-item anim-fade-up\" style=\"--d:0.65s\">\n          <div class=\"term\">Feature &amp; weight changes<\u002Fdiv>\n          <div class=\"def\">Earliest warning that the world the model learned has shifted.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"model-item anim-fade-up\" style=\"--d:0.75s\">\n          <div class=\"term\">Precision<\u002Fdiv>\n          <div class=\"def\">Accuracy of positive predictions — the cost-of-being-wrong gauge.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"model-item anim-fade-up\" style=\"--d:0.85s\">\n          <div class=\"term\">Recall<\u002Fdiv>\n          <div class=\"def\">True-positive rate — how much we're catching, not missing.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"model-item anim-fade-up\" style=\"--d:0.95s\">\n          <div class=\"term\">F1 Score<\u002Fdiv>\n          <div class=\"def\">Combined precision and recall — the single number for review meetings.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- ===== SLIDE 12 — Readiness ===== -->\n  <section data-label=\"12 Readiness\">\n\n    <div class=\"slide-pad\">\n      <div class=\"eyebrow anim-fade-up\" style=\"--d:0.1s\">Assumptions &amp; Dependencies<\u002Fdiv>\n      <h2 class=\"title-md anim-fade-up\" style=\"--d:0.25s\">\n        What we <span style=\"color:var(--orange); font-style:italic; font-family:var(--serif); display:inline-block; padding-right:0.15em;\">assume<\u002Fspan>,<br>and what we <span style=\"color:var(--orange); font-style:italic; font-family:var(--serif); display:inline-block; padding-right:0.15em;\">depend&nbsp;on<\u002Fspan>.\n      <\u002Fh2>\n\n      <div class=\"readiness\">\n        <div class=\"col anim-fade-up\" style=\"--d:0.5s\">\n          <div class=\"col-head\">Assumptions<\u002Fdiv>\n          <div class=\"col-title\">Organizational Readiness<\u002Fdiv>\n          <ul>\n            <li>Engineers will instrument new and existing pipelines.<\u002Fli>\n            <li>Managers and execs will adopt the dashboard as their source of truth.<\u002Fli>\n            <li>Data owners are willing to define SLAs for their datasets.<\u002Fli>\n            <li>Cross-team adoption beyond D2I is funded and championed.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"col anim-fade-up\" style=\"--d:0.7s\">\n          <div class=\"col-head\">Dependencies<\u002Fdiv>\n          <div class=\"col-title\">Platform Readiness<\u002Fdiv>\n          <ul>\n            <li>OpenTelemetry collector deployed and operated centrally.<\u002Fli>\n            <li>Warehouse instrumented with audit-event hooks.<\u002Fli>\n            <li>Alerting layer wired to email, SMS, and chat.<\u002Fli>\n            <li>Storage &amp; retention budget for telemetry data.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- ===== SLIDE 13 — Mitigation ===== -->\n  <section data-label=\"13 Mitigation\">\n\n    <div class=\"slide-pad\">\n      <div class=\"eyebrow anim-fade-up\" style=\"--d:0.1s\">Mitigation<\u002Fdiv>\n      <h2 class=\"title-md anim-fade-up\" style=\"--d:0.25s\">\n        How we're <em style=\"color:var(--orange); font-style:italic;\">mitigating<\u002Fem><br>each risk.\n      <\u002Fh2>\n\n      <div class=\"mit-list\">\n        <div class=\"mit-row anim-fade-up\" style=\"--d:0.5s\">\n          <div class=\"num\">🧭<\u002Fdiv>\n          <div class=\"risk\">Align First<\u002Fdiv>\n          <div class=\"fix\">Shared definition · Named owners · Dataset‑level SLAs<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"mit-row anim-fade-up\" style=\"--d:0.65s\">\n          <div class=\"num\">📐<\u002Fdiv>\n          <div class=\"risk\">Start Small<\u002Fdiv>\n          <div class=\"fix\">Tier‑1 datasets · Metrics first · Phased visibility<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"mit-row anim-fade-up\" style=\"--d:0.8s\">\n          <div class=\"num\">💰<\u002Fdiv>\n          <div class=\"risk\">Control Cost<\u002Fdiv>\n          <div class=\"fix\">Metrics‑first OTEL · Aggregation &amp; filtering · Tiered retention<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"mit-row anim-fade-up\" style=\"--d:0.95s\">\n          <div class=\"num\">🚨<\u002Fdiv>\n          <div class=\"risk\">Separate Alerts<\u002Fdiv>\n          <div class=\"fix\">Dashboards ≠ alerts · Trends over one‑offs · Baseline first<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"mit-row anim-fade-up\" style=\"--d:1.1s\">\n          <div class=\"num\">👥<\u002Fdiv>\n          <div class=\"risk\">Design by Role<\u002Fdiv>\n          <div class=\"fix\">Business views · Engineer drill‑downs · Leadership rollups<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- ===== SLIDE 14 — Alerting ===== -->\n  <section data-label=\"14 Alerting\">\n\n    <div class=\"slide-pad\">\n      <div class=\"eyebrow anim-fade-up\" style=\"--d:0.1s\">Alerting &amp; Notifications<\u002Fdiv>\n      <h2 class=\"title-md anim-fade-up\" style=\"--d:0.25s\">\n        Alerting <em style=\"color:var(--orange); font-style:italic;\">closes<\u002Fem> the loop.\n      <\u002Fh2>\n      <p class=\"lead anim-fade-up\" style=\"--d:0.4s; margin-top:24px;\">\n        Same source of truth, multiple delivery surfaces. Dashboard and notifications stay in sync.\n      <\u002Fp>\n\n      <div class=\"channels\">\n        <div class=\"channel-tile anim-fade-up\" style=\"--d:0.55s\">\n          <div class=\"ch\">Email<\u002Fdiv>\n          <div class=\"when\">Detailed contextual alerts to dataset owners and on-call engineers, with linked dashboard view.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"channel-tile anim-fade-up\" style=\"--d:0.7s\">\n          <div class=\"ch\">SMS<\u002Fdiv>\n          <div class=\"when\">Critical-tier breaches only — the smallest possible message to the right phone, fast.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"channel-tile anim-fade-up\" style=\"--d:0.85s\">\n          <div class=\"ch\">Chat &amp; Social<\u002Fdiv>\n          <div class=\"when\">Channel-scoped notifications for the team that owns the failing pipeline, with thread-based triage.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- ===== SLIDE 15 — Notification examples ===== -->\n  <section data-label=\"15 Notification examples\">\n\n    <div class=\"slide-pad\">\n      <div class=\"eyebrow anim-fade-up\" style=\"--d:0.1s\">Notification Examples<\u002Fdiv>\n      <h2 class=\"title-md anim-fade-up\" style=\"--d:0.25s\">\n        From silent failure<br>to <em style=\"color:var(--orange); font-style:italic;\">clear&nbsp;notifications<\u002Fem>.\n      <\u002Fh2>\n\n      <div class=\"phones\">\n        <div class=\"phone-stage anim-fade-up\" style=\"--d:0.5s\">\n          <div class=\"phone-label\">Current<\u002Fdiv>\n          <div class=\"phone-caption\">Stakeholders find the failure before we do.<\u002Fdiv>\n          <div class=\"phone\">\n            <div class=\"phone-screen\">\n              <div class=\"phone-time\">Tuesday, 9:47 AM<\u002Fdiv>\n              <div class=\"notif\">\n                <div class=\"ico\">M<\u002Fdiv>\n                <div>\n                  <div class=\"src\">Mail · Director, Enrollment<\u002Fdiv>\n                  <div class=\"ttl\">Re: weird numbers?<\u002Fdiv>\n                  <div class=\"body-line\">\"Hey — yesterday's enrollment counts in the dashboard look off. Can someone take a look when you get a chance?\"<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"notif\">\n                <div class=\"ico\">M<\u002Fdiv>\n                <div>\n                  <div class=\"src\">Mail · 3 forwards<\u002Fdiv>\n                  <div class=\"ttl\">Fwd: Fwd: Fwd: weird numbers?<\u002Fdiv>\n                  <div class=\"body-line\">\"+ Sarah, +Marcus — flagging in case y'all have seen this…\"<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"phone-stage anim-fade-up\" style=\"--d:0.7s\">\n          <div class=\"phone-label future\">Future<\u002Fdiv>\n          <div class=\"phone-caption\">We find the failure before stakeholders do.<\u002Fdiv>\n          <div class=\"phone dark\">\n            <div class=\"phone-screen\">\n              <div class=\"phone-time\">Tuesday, 6:12 AM<\u002Fdiv>\n              <div class=\"notif alert\">\n                <div class=\"ico\">D<\u002Fdiv>\n                <div>\n                  <div class=\"src\">D2I · Availability<\u002Fdiv>\n                  <div class=\"ttl\">SLA breach — enrollment_daily<\u002Fdiv>\n                  <div class=\"body-line\">Load delayed 47 min past target. 3 downstream dashboards, 2 reports affected.<\u002Fdiv>\n                  <div class=\"meta\">owner: d2i-oncall<br>eta: 30 min<br>→ dash/avail/enrollment<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"notif\">\n                <div class=\"ico\">C<\u002Fdiv>\n                <div>\n                  <div class=\"src\">Chat · #d2i-oncall<\u002Fdiv>\n                  <div class=\"ttl\">Auto-thread opened<\u002Fdiv>\n                  <div class=\"body-line\">Triage thread linked to incident #4471. Acknowledged by @marcus.<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- ===== SLIDE 16 — Dashboard mockup ===== -->\n  <section data-label=\"16 Dashboard\">\n\n    <div class=\"slide-pad\">\n      <div class=\"eyebrow anim-fade-up\" style=\"--d:0.1s\">What the dashboard looks like<\u002Fdiv>\n      <h2 class=\"title-md anim-fade-up\" style=\"--d:0.25s\">\n        Same data, three <em style=\"color:var(--orange); font-style:italic;\">calibrated<\u002Fem> views.\n      <\u002Fh2>\n\n      <div class=\"dash anim-fade-up\" style=\"--d:0.5s\">\n        <!-- Executive band -->\n        <div class=\"dash-tile full\">\n          <div class=\"h\">Executive · Campus Health<\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:32px; margin-top:8px;\">\n            <div><div class=\"v ok\">98.4%<\u002Fdiv><div class=\"d\">Availability · 30d<\u002Fdiv><\u002Fdiv>\n            <div><div class=\"v\">99.4%<\u002Fdiv><div class=\"d\">Freshness · SLA<\u002Fdiv><\u002Fdiv>\n            <div><div class=\"v warn\">3<\u002Fdiv><div class=\"d\">Active SLA breaches<\u002Fdiv><\u002Fdiv>\n            <div><div class=\"v\">142<\u002Fdiv><div class=\"d\">Successful loads · 24h<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Manager view -->\n        <div class=\"dash-tile\">\n          <div class=\"h\">Manager · Pipeline Status<\u002Fdiv>\n          <div style=\"font-family:var(--mono); font-size:24px; line-height:1.85; margin-top:14px; color:rgba(248,243,230,0.85);\">\n            <span style=\"color:#8BC0A8;\">●<\u002Fspan> enrollment_daily &nbsp; <span style=\"color:rgba(248,243,230,0.5);\">on time<\u002Fspan><br>\n            <span style=\"color:#8BC0A8;\">●<\u002Fspan> finance_gl_load &nbsp; <span style=\"color:rgba(248,243,230,0.5);\">on time<\u002Fspan><br>\n            <span style=\"color:#E89A3D;\">●<\u002Fspan> course_catalog &nbsp; <span style=\"color:rgba(248,243,230,0.5);\">+12 min<\u002Fspan><br>\n            <span style=\"color:#D87065;\">●<\u002Fspan> research_funding &nbsp; <span style=\"color:rgba(248,243,230,0.5);\">failed · 2h<\u002Fspan><br>\n            <span style=\"color:#8BC0A8;\">●<\u002Fspan> hr_employee_dim &nbsp; <span style=\"color:rgba(248,243,230,0.5);\">on time<\u002Fspan><br>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Engineer view -->\n        <div class=\"dash-tile\">\n          <div class=\"h\">Engineer · Failure Log<\u002Fdiv>\n          <div style=\"font-family:var(--mono); font-size:24px; line-height:1.7; margin-top:14px; color:rgba(248,243,230,0.7);\">\n            10:24:11 &nbsp; <span style=\"color:#D87065;\">ERR<\u002Fspan> &nbsp; research_funding<br>\n            <span style=\"padding-left:24px;\">load_step: stage_to_dim<\u002Fspan><br>\n            <span style=\"padding-left:24px;\">cause: src_schema_drift<\u002Fspan><br>\n            <span style=\"padding-left:24px;\">retry: 3/3 · escalated<\u002Fspan><br>\n            <br>\n            10:18:02 &nbsp; <span style=\"color:#E89A3D;\">WARN<\u002Fspan> course_catalog<br>\n            <span style=\"padding-left:24px;\">latency above p95 threshold<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Trend chart -->\n        <div class=\"dash-tile\">\n          <div class=\"h\">Trend · Availability 30d<\u002Fdiv>\n          <svg viewBox=\"0 0 320 140\" style=\"margin-top:12px; width:100%;\">\n            <polyline fill=\"none\" stroke=\"#D6A461\" stroke-width=\"2\" points=\"0,40 30,38 60,42 90,35 120,38 150,32 180,68 210,40 240,36 270,30 300,32 320,28\"><\u002Fpolyline>\n            <line x1=\"0\" y1=\"50\" x2=\"320\" y2=\"50\" stroke=\"rgba(214,164,97,0.25)\" stroke-dasharray=\"3 3\" stroke-width=\"1\"><\u002Fline>\n            <text x=\"0\" y=\"130\" font-family=\"Inter\" font-size=\"24\" fill=\"rgba(248,243,230,0.55)\" font-weight=\"500\">30d ago<\u002Ftext>\n            <text x=\"240\" y=\"130\" font-family=\"Inter\" font-size=\"24\" fill=\"rgba(248,243,230,0.55)\" font-weight=\"500\">today<\u002Ftext>\n          <\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- ===== SLIDE 17 — Q&A ===== -->\n  <section data-label=\"17 Q&amp;A\" class=\"no-chrome\">\n    <div class=\"qa\">\n      <div class=\"qmark anim-fade-up\" style=\"--d:0.1s\">?<\u002Fdiv>\n      <div class=\"qa-label anim-fade-up\" style=\"--d:0.4s\">Questions<\u002Fdiv>\n      <div class=\"qa-sub anim-fade-up\" style=\"--d:0.6s\">D2I · Data to Insights · UT Austin<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdeck-stage>\n\n\n\n<\u002Fbody><\u002Fhtml>"
